<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_title }} · 计分礼物</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c1016;
      --panel: #151b24;
      --panel-2: #1b2430;
      --panel-3: #223044;
      --line: #2c394b;
      --text: #e8eef6;
      --muted: #95a4b6;
      --faint: #657386;
      --ink: #091017;
      --teal: #41b9aa;
      --gold: #f0b84b;
      --blue: #67a8ff;
      --pink: #e87da7;
      --green: #4dc27c;
      --red: #e36f6f;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(65, 185, 170, 0.08), transparent 240px),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      line-height: 1.45;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    #loginOverlay.hidden { display: none; }

    .login-box {
      width: min(360px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .login-box h1 { font-size: 20px; font-weight: 720; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 18px; }

    .login-box input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .login-box input:focus { border-color: var(--teal); }

    .login-btn {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--teal);
      color: var(--ink);
      font-weight: 760;
    }

    .login-error {
      display: none;
      margin-top: 10px;
      color: var(--red);
      font-size: 13px;
    }

    .login-error.show { display: block; }

    .page { display: none; min-height: 100vh; }
    .page.ready { display: block; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(12, 16, 22, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .title h1 { font-size: 21px; font-weight: 760; letter-spacing: 0; }
    .title p { color: var(--muted); font-size: 13px; margin-top: 3px; }

    .refresh {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .refresh strong { color: var(--teal); font-weight: 740; }

    main {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 22px 24px 36px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015)), var(--panel);
      padding: 14px;
    }

    .kpi .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .kpi .value { font-size: 25px; font-weight: 780; letter-spacing: 0; }
    .kpi .sub { color: var(--faint); font-size: 12px; margin-top: 4px; }
    .kpi.total .value { color: var(--gold); }
    .kpi.room .value { color: var(--teal); }
    .kpi.live .value { color: var(--pink); }

    .toolbar {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      margin-bottom: 16px;
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(180px, 250px) minmax(150px, 210px) minmax(150px, 210px) minmax(135px, 170px) minmax(135px, 170px) auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }

    .field input:focus,
    .field select:focus { border-color: var(--teal); }

    .field input[type="date"] {
      color-scheme: dark;
    }

    .field input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 1;
      filter: invert(79%) sepia(23%) saturate(695%) hue-rotate(126deg) brightness(98%) contrast(91%);
    }

    .field input[type="date"]::-webkit-calendar-picker-indicator:hover {
      filter: invert(87%) sepia(65%) saturate(568%) hue-rotate(353deg) brightness(99%) contrast(90%);
    }

    .segment {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(68px, 1fr));
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--ink);
    }

    .segment button {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
    }

    .segment button:last-child { border-right: 0; }

    .segment button.active {
      background: var(--teal);
      color: var(--ink);
      font-weight: 760;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 13px;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: var(--ink);
      font-weight: 760;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.35fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .jump-grid {
      margin-top: 10px;
      grid-template-columns: minmax(160px, 220px) auto minmax(0, 1fr);
    }

    .jump-status {
      display: inline;
      margin-left: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      min-height: 48px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head h2 { font-size: 15px; font-weight: 740; }
    .panel-head span { color: var(--muted); font-size: 12px; }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .mini-btn {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 13px 14px 15px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(88px, auto);
      gap: 10px;
      align-items: center;
      min-height: 36px;
    }

    .bar-label {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .gift-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--panel-3);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .name {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 680;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      color: var(--faint);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      height: 7px;
      margin-top: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    .bar-fill {
      width: var(--bar-width, 0%);
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
    }

    .bar-row.gift-1 .bar-fill { background: var(--gold); }
    .bar-row.gift-2 .bar-fill { background: var(--pink); }
    .bar-row.gift-3 .bar-fill { background: var(--blue); }

    .bar-value {
      color: var(--text);
      font-size: 13px;
      font-weight: 740;
      text-align: right;
      white-space: nowrap;
    }

    .split-score {
      color: var(--faint);
      font-size: 12px;
      margin-top: 2px;
    }

    .distribution-more {
      display: none;
      width: calc(100% - 28px);
      min-height: 42px;
      margin: -3px 14px 14px;
      border: 1px solid rgba(65, 185, 170, 0.34);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(65, 185, 170, 0.12), rgba(240, 184, 75, 0.08));
      color: var(--text);
      padding: 0 12px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      overflow: hidden;
      text-align: left;
    }

    .distribution-more.show { display: flex; }

    .distribution-more::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--pink));
      opacity: 0.9;
    }

    .distribution-more:hover,
    .distribution-more:focus-visible {
      border-color: var(--gold);
      outline: none;
    }

    .distribution-more-text {
      font-size: 13px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .distribution-more-action {
      color: var(--gold);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .daily-list {
      padding: 10px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .daily-row {
      border: 1px solid rgba(44, 57, 75, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.025);
      padding: 10px;
    }

    .daily-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .daily-date { font-weight: 720; font-size: 13px; }
    .daily-score { color: var(--gold); font-weight: 760; font-size: 13px; }

    .stack {
      display: grid;
      grid-template-columns: var(--room-share, 50%) 1fr;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    .stack-room { background: var(--teal); min-width: 2px; }
    .stack-live { background: var(--pink); min-width: 2px; }

    .table-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .detail-list {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-group {
      border: 1px solid rgba(44, 57, 75, 0.78);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.018);
    }

    .day-head {
      min-height: 40px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(44, 57, 75, 0.72);
      background: var(--panel-2);
    }

    .day-head strong { font-size: 14px; }
    .day-head span { color: var(--muted); font-size: 12px; }

    .detail-row {
      display: grid;
      grid-template-columns: 150px minmax(145px, 0.75fr) minmax(190px, 0.95fr) minmax(112px, 0.45fr) minmax(150px, 0.7fr) minmax(205px, 1fr);
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid rgba(44, 57, 75, 0.55);
      align-items: center;
    }

    .detail-row:last-child { border-bottom: 0; }

    .source-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 9px;
      margin-bottom: 5px;
      color: var(--ink);
      background: var(--teal);
      font-size: 12px;
      font-weight: 760;
    }

    .detail-row.source-live .source-tag { background: var(--pink); }

    .time-text { color: var(--text); font-size: 13px; }
    .primary-text { color: var(--text); font-size: 13px; font-weight: 680; word-break: break-word; }
    .secondary-text { color: var(--muted); font-size: 12px; margin-top: 3px; word-break: break-word; }
    .score-text { color: var(--gold); font-size: 16px; font-weight: 780; }
    .fulfillment-cell .primary-text.is-complete { color: var(--teal); }
    .fulfillment-cell .primary-text.is-pending { color: var(--pink); }
    .fulfillment-cell .primary-text.is-uncertain { color: var(--gold); }
    .review-note {
      display: inline-block;
      margin-left: 4px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 620;
    }

    .fulfillment-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
    }

    .edit-business-btn {
      min-height: 26px;
      border: 1px solid rgba(103, 168, 255, 0.44);
      border-radius: 8px;
      background: rgba(103, 168, 255, 0.1);
      color: var(--blue);
      padding: 0 9px;
      font-size: 12px;
      font-weight: 680;
    }

    .gift-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .empty {
      display: none;
      padding: 42px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .empty.show { display: block; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .pager-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .load-more {
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    #loadMoreSentinel {
      height: 1px;
    }

    .day-group.jump-highlight {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(240, 184, 75, 0.32);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.hidden { display: none; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 12, 0.72);
      backdrop-filter: blur(8px);
    }

    .modal-dialog {
      position: relative;
      width: min(780px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-head {
      min-height: 52px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h2 { font-size: 16px; font-weight: 740; }
    .modal-body { overflow: auto; }

    .business-form {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .business-form .field textarea {
      width: 100%;
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: var(--text);
      padding: 10px;
      outline: none;
      resize: vertical;
    }

    .business-form .field textarea:focus { border-color: var(--teal); }
    .business-meta { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .business-form-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .business-error { display: none; color: var(--red); font-size: 13px; }
    .business-error.show { display: block; }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .loading {
      opacity: 0.68;
      pointer-events: none;
    }

    @media (max-width: 1260px) {
      .kpi-grid { grid-template-columns: repeat(3, minmax(140px, 1fr)); }
      .toolbar-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .jump-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .analytics-grid { grid-template-columns: 1fr; }
      .detail-row { grid-template-columns: 138px minmax(150px, 0.8fr) minmax(190px, 1fr) minmax(120px, 0.55fr); }
      .detail-row .fulfillment-cell,
      .detail-row .context-cell { grid-column: 2 / -1; }
    }

    @media (max-width: 760px) {
      .topbar-inner {
        padding: 16px;
        align-items: flex-start;
        flex-direction: column;
      }

      .refresh { text-align: left; }
      main { padding: 16px; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar-grid { grid-template-columns: 1fr; }
      .jump-grid { grid-template-columns: 1fr; }
      .actions .btn { flex: 1; }
      .table-head, .pagination { align-items: flex-start; flex-direction: column; }
      .detail-list { padding: 12px; }
      .detail-row { grid-template-columns: 1fr; gap: 7px; }
      .detail-row .context-cell { grid-column: auto; }
      .day-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="loginOverlay">
    <div class="login-box">
      <h1>计分礼物</h1>
      <p>请输入计分礼物页密码</p>
      <input type="password" id="passwordInput" placeholder="密码" autocomplete="current-password" autofocus>
      <button class="login-btn" id="loginBtn">进入</button>
      <div class="login-error" id="loginError">密码错误</div>
    </div>
  </div>

  <div class="page" id="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="title">
          <h1>计分礼物</h1>
          <p>房间与直播弹幕的计分送礼统计</p>
        </div>
        <div class="refresh">
          <div>数据每 <strong id="refreshSeconds">30</strong> 秒刷新</div>
          <div id="generatedAt">生成时间：-</div>
        </div>
      </div>
    </header>

    <main id="dashboard">
      <section class="kpi-grid" aria-label="计分礼物统计">
        <div class="kpi total">
          <div class="label">总分</div>
          <div class="value" id="totalScore">0</div>
          <div class="sub" id="totalCount">礼物数 0</div>
        </div>
        <div class="kpi room">
          <div class="label">房间分</div>
          <div class="value" id="roomScore">0</div>
          <div class="sub" id="roomRecords">0 条房间记录</div>
        </div>
        <div class="kpi live">
          <div class="label">直播分</div>
          <div class="value" id="liveScore">0</div>
          <div class="sub" id="liveRecords">0 条直播记录</div>
        </div>
        <div class="kpi">
          <div class="label">计分消息</div>
          <div class="value" id="totalRecords">0</div>
          <div class="sub" id="activeDays">0 天</div>
        </div>
        <div class="kpi">
          <div class="label">送礼用户</div>
          <div class="value" id="uniqueSenders">0</div>
          <div class="sub">账号 ID 优先合并</div>
        </div>
        <div class="kpi">
          <div class="label">礼物种类</div>
          <div class="value" id="giftKinds">0</div>
          <div class="sub" id="liveSessions">直播 0 场</div>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选条件">
        <div class="toolbar-grid">
          <div class="field">
            <label>来源</label>
            <div class="segment" id="sourceSegment">
              <button type="button" data-source="all" class="active">全部</button>
              <button type="button" data-source="room">房间</button>
              <button type="button" data-source="live">直播</button>
            </div>
          </div>
          <div class="field">
            <label for="giftSelect">礼物</label>
            <select id="giftSelect">
              <option value="">全部礼物</option>
            </select>
          </div>
          <div class="field">
            <label for="senderInput">送礼用户</label>
            <input id="senderInput" type="search" placeholder="昵称或账号 ID">
          </div>
          <div class="field">
            <label for="dateFromInput">开始日期</label>
            <input id="dateFromInput" type="date">
          </div>
          <div class="field">
            <label for="dateToInput">结束日期</label>
            <input id="dateToInput" type="date">
          </div>
          <div class="field">
            <label for="sortSelect">排序</label>
            <select id="sortSelect">
              <option value="time_desc">按时间</option>
              <option value="score_desc">按分值</option>
            </select>
          </div>
          <div class="actions">
            <button class="btn primary" id="applyBtn" type="button">筛选</button>
            <button class="btn" id="resetBtn" type="button">重置</button>
          </div>
        </div>
        <div class="toolbar-grid jump-grid">
          <div class="field">
            <label for="jumpDateInput">日期跳转 <span class="jump-status" id="jumpStatus"></span></label>
            <input id="jumpDateInput" type="date">
          </div>
          <div class="actions">
            <button class="btn" id="jumpDateBtn" type="button">跳转</button>
          </div>
          <div></div>
        </div>
      </section>

      <section class="analytics-grid" aria-label="计分分布">
        <div class="panel">
          <div class="panel-head">
            <h2>礼物分布</h2>
            <span id="giftDistributionCount">0 种</span>
          </div>
          <div class="bar-list" id="giftBars"></div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h2>送礼用户分布</h2>
            <div class="panel-actions">
              <span id="senderDistributionCount">0 人</span>
              <button class="mini-btn" id="openSenderModalBtn" type="button">全部</button>
            </div>
          </div>
          <div class="bar-list" id="senderBars"></div>
          <button class="distribution-more" id="senderMoreBar" type="button" aria-haspopup="dialog" aria-controls="senderModal" aria-hidden="true">
            <span class="distribution-more-text" id="senderMoreText"></span>
            <span class="distribution-more-action">查看全部</span>
          </button>
        </div>
      </section>

      <section class="table-panel" id="detailPanel">
        <div class="table-head">
          <div id="resultSummary">共 0 条</div>
          <div id="activeFilters">全部来源</div>
        </div>
        <div class="detail-list" id="detailList"></div>
        <div class="empty" id="emptyState">当前筛选条件下没有计分礼物</div>
        <div class="load-more" id="loadMoreState">已加载 0 条</div>
        <div id="loadMoreSentinel"></div>
      </section>
    </main>

  <div class="modal hidden" id="senderModal" role="dialog" aria-modal="true" aria-labelledby="senderModalTitle">
    <div class="modal-backdrop" id="senderModalBackdrop"></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h2 id="senderModalTitle">送礼用户分布</h2>
        <button class="mini-btn" id="closeSenderModalBtn" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <div class="bar-list" id="senderModalBars"></div>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="businessModal" role="dialog" aria-modal="true" aria-labelledby="businessModalTitle">
    <div class="modal-backdrop" id="businessModalBackdrop"></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h2 id="businessModalTitle">核实业务兑换</h2>
        <button class="mini-btn" id="closeBusinessModalBtn" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <form class="business-form" id="businessForm">
          <div class="business-meta" id="businessMeta"></div>
          <div class="field">
            <label for="businessStatusSelect">兑换状态</label>
            <select id="businessStatusSelect">
              <option value="redeemed">已兑换业务</option>
              <option value="unredeemed">未兑换业务</option>
              <option value="uncertain">待人工核实</option>
            </select>
          </div>
          <div class="field">
            <label for="businessTypeInput">业务类型</label>
            <input id="businessTypeInput" type="text" placeholder="点歌/唱歌、舞蹈、祝福、互动等">
          </div>
          <div class="field">
            <label for="businessContentInput">兑换内容</label>
            <textarea id="businessContentInput" placeholder="填写具体业务、歌曲名或说明"></textarea>
          </div>
          <div class="field">
            <label for="businessEvidenceInput">证据弹幕</label>
            <textarea id="businessEvidenceInput" placeholder="可填写关键弹幕原文或核实依据"></textarea>
          </div>
          <div class="business-error" id="businessError"></div>
          <div class="business-form-actions">
            <button class="btn" id="verifyBusinessBtn" type="button">确认已核实</button>
            <button class="btn primary" id="saveBusinessBtn" type="submit">保存修正</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
  (function() {
    "use strict";

    var password = "";
    var page = 1;
    var pageSize = 100;
    var totalPages = 1;
    var totalItems = 0;
    var hasMore = false;
    var loadingMore = false;
    var loadedItems = [];
    var loadObserver = null;
    var sourceFilter = "all";
    var refreshTimer = null;
    var refreshSeconds = 30;
    var lastCatalogHash = "";
    var senderDistributionItems = [];
    var editingBusinessItem = null;

    var loginOverlay = document.getElementById("loginOverlay");
    var passwordInput = document.getElementById("passwordInput");
    var loginBtn = document.getElementById("loginBtn");
    var loginError = document.getElementById("loginError");
    var pageEl = document.getElementById("page");
    var dashboard = document.getElementById("dashboard");
    var refreshSecondsEl = document.getElementById("refreshSeconds");
    var generatedAt = document.getElementById("generatedAt");
    var totalScore = document.getElementById("totalScore");
    var roomScore = document.getElementById("roomScore");
    var liveScore = document.getElementById("liveScore");
    var totalCount = document.getElementById("totalCount");
    var roomRecords = document.getElementById("roomRecords");
    var liveRecords = document.getElementById("liveRecords");
    var totalRecords = document.getElementById("totalRecords");
    var activeDays = document.getElementById("activeDays");
    var uniqueSenders = document.getElementById("uniqueSenders");
    var giftKinds = document.getElementById("giftKinds");
    var liveSessions = document.getElementById("liveSessions");
    var sourceSegment = document.getElementById("sourceSegment");
    var giftSelect = document.getElementById("giftSelect");
    var senderInput = document.getElementById("senderInput");
    var dateFromInput = document.getElementById("dateFromInput");
    var dateToInput = document.getElementById("dateToInput");
    var sortSelect = document.getElementById("sortSelect");
    var jumpDateInput = document.getElementById("jumpDateInput");
    var jumpDateBtn = document.getElementById("jumpDateBtn");
    var jumpStatus = document.getElementById("jumpStatus");
    var applyBtn = document.getElementById("applyBtn");
    var resetBtn = document.getElementById("resetBtn");
    var giftBars = document.getElementById("giftBars");
    var senderBars = document.getElementById("senderBars");
    var senderMoreBar = document.getElementById("senderMoreBar");
    var senderMoreText = document.getElementById("senderMoreText");
    var senderModal = document.getElementById("senderModal");
    var senderModalBars = document.getElementById("senderModalBars");
    var openSenderModalBtn = document.getElementById("openSenderModalBtn");
    var closeSenderModalBtn = document.getElementById("closeSenderModalBtn");
    var senderModalBackdrop = document.getElementById("senderModalBackdrop");
    var businessModal = document.getElementById("businessModal");
    var businessModalBackdrop = document.getElementById("businessModalBackdrop");
    var closeBusinessModalBtn = document.getElementById("closeBusinessModalBtn");
    var businessForm = document.getElementById("businessForm");
    var businessMeta = document.getElementById("businessMeta");
    var businessStatusSelect = document.getElementById("businessStatusSelect");
    var businessTypeInput = document.getElementById("businessTypeInput");
    var businessContentInput = document.getElementById("businessContentInput");
    var businessEvidenceInput = document.getElementById("businessEvidenceInput");
    var businessError = document.getElementById("businessError");
    var verifyBusinessBtn = document.getElementById("verifyBusinessBtn");
    var saveBusinessBtn = document.getElementById("saveBusinessBtn");
    var giftDistributionCount = document.getElementById("giftDistributionCount");
    var senderDistributionCount = document.getElementById("senderDistributionCount");
    var resultSummary = document.getElementById("resultSummary");
    var activeFilters = document.getElementById("activeFilters");
    var detailList = document.getElementById("detailList");
    var emptyState = document.getElementById("emptyState");
    var loadMoreState = document.getElementById("loadMoreState");
    var loadMoreSentinel = document.getElementById("loadMoreSentinel");

    function doLogin() {
      var value = passwordInput.value.trim();
      if (!value) return;
      password = value;
      loginError.classList.remove("show");
      fetchData({ resetTimer: true });
    }

    function buildQuery(queryPage) {
      var params = new URLSearchParams();
      params.set("page", String(queryPage || page));
      params.set("page_size", String(pageSize));
      params.set("source", sourceFilter);
      params.set("gift_name", giftSelect.value || "");
      params.set("sender", senderInput.value.trim());
      params.set("date_from", dateFromInput.value || "");
      params.set("date_to", dateToInput.value || "");
      params.set("sort", sortSelect.value || "time_desc");
      return params.toString();
    }

    async function fetchData(options) {
      options = options || {};
      page = 1;
      loadedItems = [];
      hasMore = false;
      setLoadMoreText("正在加载...");
      dashboard.classList.add("loading");
      try {
        var resp = await fetch("/api/score-gifts/data?" + buildQuery(1), {
          headers: { "X-Score-Gifts-Password": password },
          cache: "no-store"
        });

        if (await handleAuthFailure(resp)) {
          return;
        }

        if (!resp.ok) {
          throw new Error(await readError(resp) || ("HTTP " + resp.status));
        }

        var data = await resp.json();
        loadedItems = data.items || [];
        page = Number(data.page || 1);
        totalPages = Number(data.total_pages || 1);
        totalItems = Number(data.total || loadedItems.length);
        hasMore = page < totalPages;

        loginOverlay.classList.add("hidden");
        pageEl.classList.add("ready");
        render(data);
        setupInfiniteScroll();
        if (options.resetTimer) resetRefreshTimer();
      } catch (err) {
        loginError.textContent = "加载失败：" + err.message;
        loginError.classList.add("show");
      } finally {
        dashboard.classList.remove("loading");
      }
    }

    async function loadNextPage(options) {
      options = options || {};
      if (loadingMore || !hasMore) return false;
      loadingMore = true;
      var nextPage = page + 1;
      setLoadMoreText("正在加载更多...");
      try {
        var resp = await fetch("/api/score-gifts/data?" + buildQuery(nextPage), {
          headers: { "X-Score-Gifts-Password": password },
          cache: "no-store"
        });
        if (await handleAuthFailure(resp)) return false;
        if (!resp.ok) throw new Error(await readError(resp) || ("HTTP " + resp.status));

        var data = await resp.json();
        page = Number(data.page || nextPage);
        totalPages = Number(data.total_pages || totalPages);
        totalItems = Number(data.total || totalItems);
        hasMore = page < totalPages;
        appendItems(data.items || []);
        renderDetails(loadedItems);
        renderLoadState();
        renderFilterSummary();
        return true;
      } catch (err) {
        page = Math.max(1, nextPage - 1);
        setLoadMoreText("加载失败：" + err.message);
        return false;
      } finally {
        loadingMore = false;
        if (!options.keepMessage) renderLoadState();
      }
    }

    async function handleAuthFailure(resp) {
      if (resp.status !== 401 && resp.status !== 403) return false;
      var detail = await readError(resp);
      loginError.textContent = detail || "密码错误";
      loginError.classList.add("show");
      loginOverlay.classList.remove("hidden");
      pageEl.classList.remove("ready");
      passwordInput.value = "";
      passwordInput.focus();
      stopRefresh();
      return true;
    }

    async function readError(resp) {
      try {
        var data = await resp.json();
        return data.detail || "";
      } catch (err) {
        return "";
      }
    }

    function render(data) {
      var summary = data.filtered_summary || data.summary || {};
      refreshSeconds = Number(data.refresh_interval_seconds || 30);
      refreshSecondsEl.textContent = String(refreshSeconds);
      generatedAt.textContent = "生成时间：" + (data.generated_at || "-");

      totalScore.textContent = formatScore(summary.total_score);
      roomScore.textContent = formatScore(summary.room_score);
      liveScore.textContent = formatScore(summary.live_score);
      totalCount.textContent = "礼物数 " + formatNumber(summary.total_count || 0);
      roomRecords.textContent = formatNumber(summary.room_records || 0) + " 条房间记录";
      liveRecords.textContent = formatNumber(summary.live_records || 0) + " 条直播记录";
      totalRecords.textContent = formatNumber(summary.total_records || 0);
      activeDays.textContent = formatNumber(summary.active_days || 0) + " 天";
      uniqueSenders.textContent = formatNumber(summary.unique_senders || 0);
      giftKinds.textContent = formatNumber(summary.gift_kinds || 0);
      liveSessions.textContent = "直播 " + formatNumber(summary.live_sessions || 0) + " 场";

      syncGiftOptions(data.gift_catalog || []);
      renderGiftBars(data.gift_distribution || []);
      renderSenderBars(data.sender_distribution || []);
      renderDetails(loadedItems);
      renderLoadState();
      renderFilterSummary();
    }

    function syncGiftOptions(catalog) {
      var hash = catalog.map(function(item) {
        return [item.gift_id, item.gift_name, item.total_score].join(":");
      }).join("|");
      if (hash === lastCatalogHash) return;
      lastCatalogHash = hash;

      var selected = giftSelect.value;
      giftSelect.textContent = "";
      var all = document.createElement("option");
      all.value = "";
      all.textContent = "全部礼物";
      giftSelect.appendChild(all);

      catalog.forEach(function(item) {
        var opt = document.createElement("option");
        opt.value = item.gift_name || "";
        opt.textContent = (item.gift_name || "未命名礼物") + " (" + formatScore(item.total_score || 0) + ")";
        giftSelect.appendChild(opt);
      });
      giftSelect.value = selected;
    }

    function renderGiftBars(items) {
      giftDistributionCount.textContent = formatNumber(items.length) + " 种";
      renderBarList(giftBars, items.slice(0, 10), {
        classPrefix: "gift",
        maxValue: maxScore(items),
        label: function(item) { return item.gift_name || "未命名礼物"; },
        meta: function(item) {
          return "数量 " + formatNumber(item.total_count || 0) + " · 用户 " + formatNumber(item.senders || 0);
        },
        value: function(item) { return item.total_score || 0; },
        split: function(item) {
          return "房间 " + formatScore(item.room_score || 0) + " · 直播 " + formatScore(item.live_score || 0);
        },
        icon: true
      });
    }

    function renderSenderBars(items) {
      senderDistributionItems = items;
      senderDistributionCount.textContent = formatNumber(items.length) + " 人";
      var hiddenCount = Math.max(0, items.length - 10);
      openSenderModalBtn.style.display = hiddenCount > 0 ? "inline-flex" : "none";
      senderMoreBar.classList.toggle("show", hiddenCount > 0);
      senderMoreBar.disabled = hiddenCount <= 0;
      senderMoreBar.setAttribute("aria-hidden", hiddenCount > 0 ? "false" : "true");
      senderMoreText.textContent = hiddenCount > 0 ? "还有 " + formatNumber(hiddenCount) + " 人未显示，点击查看完整分布" : "";
      renderBarList(senderBars, items.slice(0, 10), senderBarOptions(items));
      if (!senderModal.classList.contains("hidden")) renderSenderModal();
    }

    function senderBarOptions(items) {
      return {
        classPrefix: "sender",
        maxValue: maxScore(items),
        label: function(item) { return senderDisplayName(item); },
        meta: function(item) {
          var parts = [];
          var id = firstSenderId(item);
          parts.push(id ? "ID " + id : "按昵称兜底");
          if (Array.isArray(item.sender_names) && item.sender_names.length > 1) {
            parts.push("昵称 " + item.sender_names.slice(0, 2).join(" / "));
          }
          parts.push("记录 " + formatNumber(item.records || 0));
          parts.push("礼物 " + formatNumber(item.total_count || 0));
          return parts.join(" · ");
        },
        value: function(item) { return item.total_score || 0; },
        split: function(item) {
          return "房间 " + formatScore(item.room_score || 0) + " · 直播 " + formatScore(item.live_score || 0);
        }
      };
    }

    function renderSenderModal() {
      renderBarList(senderModalBars, senderDistributionItems, senderBarOptions(senderDistributionItems));
    }

    function openSenderModal() {
      renderSenderModal();
      senderModal.classList.remove("hidden");
    }

    function closeSenderModal() {
      senderModal.classList.add("hidden");
    }

    function openBusinessModal(item) {
      editingBusinessItem = item;
      businessError.classList.remove("show");
      businessError.textContent = "";
      businessMeta.textContent = [
        item.event_time || "-",
        item.sender_name || "未知用户",
        item.gift_name || "-",
        formatScore(item.total_score || 0) + " 分",
        item.live_title || item.live_id || ""
      ].filter(Boolean).join(" · ");
      businessStatusSelect.value = normalBusinessStatus(item.business_status);
      businessTypeInput.value = item.business_type || "";
      businessContentInput.value = item.business_content || businessEditableContent(item);
      businessEvidenceInput.value = item.business_evidence || item.business_analysis_reasoning || "";
      businessModal.classList.remove("hidden");
    }

    function closeBusinessModal() {
      businessModal.classList.add("hidden");
      editingBusinessItem = null;
    }

    function normalBusinessStatus(value) {
      if (value === "redeemed" || value === "unredeemed" || value === "uncertain") return value;
      return "uncertain";
    }

    function businessEditableContent(item) {
      if (item.business_status === "redeemed") return item.business_content || "";
      if (item.business_status === "unredeemed") return item.fulfillment_detail || "未找到明确业务兑换";
      return item.fulfillment_detail || "";
    }

    async function verifyBusiness() {
      if (!editingBusinessItem) return;
      await submitBusinessReview({
        action: "verify",
        item_id: editingBusinessItem.id
      });
    }

    async function saveBusinessOverride(event) {
      if (event) event.preventDefault();
      if (!editingBusinessItem) return;
      await submitBusinessReview({
        action: "override",
        item_id: editingBusinessItem.id,
        business_status: businessStatusSelect.value,
        business_type: businessTypeInput.value.trim(),
        business_content: businessContentInput.value.trim(),
        evidence: businessEvidenceInput.value.trim()
      });
    }

    async function submitBusinessReview(payload) {
      businessError.classList.remove("show");
      businessError.textContent = "";
      setBusinessSaving(true);
      try {
        var resp = await fetch("/api/score-gifts/business-review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Score-Gifts-Password": password
          },
          body: JSON.stringify(payload),
          cache: "no-store"
        });
        if (await handleAuthFailure(resp)) return;
        if (!resp.ok) throw new Error(await readError(resp) || ("HTTP " + resp.status));
        var data = await resp.json();
        updateLoadedBusinessItem(payload.item_id, data.fields || {}, data.record || {});
        renderDetails(loadedItems);
        closeBusinessModal();
      } catch (err) {
        businessError.textContent = "保存失败：" + err.message;
        businessError.classList.add("show");
      } finally {
        setBusinessSaving(false);
      }
    }

    function setBusinessSaving(saving) {
      verifyBusinessBtn.disabled = saving;
      saveBusinessBtn.disabled = saving;
    }

    function updateLoadedBusinessItem(itemId, fields, record) {
      loadedItems.forEach(function(item) {
        if (item.id !== itemId) return;
        Object.keys(fields || {}).forEach(function(key) {
          item[key] = fields[key];
        });
        if (record.review_status) item.business_review_status = record.review_status;
        if (record.reviewed_at) item.business_reviewed_at = record.reviewed_at;
        if (record.analysis_source) item.business_analysis_source = record.analysis_source;
        if (record.reasoning) item.business_analysis_reasoning = record.reasoning;
        if (record.evidence) item.business_evidence = record.evidence;
        item.fulfillment_label = businessLabel(item.business_status);
        item.fulfillment_detail = businessDetail(item);
      });
    }

    function businessLabel(status) {
      if (status === "redeemed") return "已兑换业务";
      if (status === "uncertain") return "待人工核实";
      if (status === "unredeemed") return "未兑换业务";
      return "待分析";
    }

    function businessDetail(item) {
      if (item.business_status === "redeemed") {
        return [item.business_type, item.business_content].filter(Boolean).join("：") || "已兑换业务";
      }
      if (item.business_status === "uncertain") {
        return item.business_content || item.business_evidence || item.business_analysis_reasoning || "待人工核实";
      }
      return item.business_content || "未找到明确业务兑换";
    }

    function renderBarList(parent, items, options) {
      parent.textContent = "";
      if (items.length === 0) {
        parent.appendChild(emptyInline("暂无数据"));
        return;
      }
      items.forEach(function(item, index) {
        var row = document.createElement("div");
        row.className = "bar-row " + options.classPrefix + "-" + (index + 1);
        var label = document.createElement("div");
        label.className = "bar-label";
        if (options.icon && item.gift_icon_url) {
          var img = document.createElement("img");
          img.className = "gift-icon";
          img.src = item.gift_icon_url;
          img.alt = "";
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          label.appendChild(img);
        }
        var text = document.createElement("div");
        text.style.minWidth = "0";
        var name = document.createElement("div");
        name.className = "name";
        name.textContent = options.label(item);
        var meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = options.meta(item);
        var track = document.createElement("div");
        track.className = "bar-track";
        var fill = document.createElement("div");
        fill.className = "bar-fill";
        fill.style.setProperty("--bar-width", percent(options.value(item), options.maxValue) + "%");
        track.appendChild(fill);
        text.appendChild(name);
        text.appendChild(meta);
        text.appendChild(track);
        label.appendChild(text);
        row.appendChild(label);

        var value = document.createElement("div");
        value.className = "bar-value";
        value.textContent = formatScore(options.value(item));
        var split = document.createElement("div");
        split.className = "split-score";
        split.textContent = options.split(item);
        value.appendChild(split);
        row.appendChild(value);
        parent.appendChild(row);
      });
    }

    function renderDetails(items) {
      detailList.textContent = "";
      emptyState.classList.toggle("show", items.length === 0);
      detailList.style.display = items.length ? "flex" : "none";
      if (items.length === 0) return;

      var groups = [];
      var byDate = {};
      items.forEach(function(item) {
        var date = item.date || item.event_time.slice(0, 10) || "未知日期";
        if (!byDate[date]) {
          byDate[date] = [];
          groups.push(date);
        }
        byDate[date].push(item);
      });

      groups.forEach(function(date) {
        var group = byDate[date];
        var section = document.createElement("article");
        section.className = "day-group";
        section.setAttribute("data-date", date);
        var head = document.createElement("div");
        head.className = "day-head";
        var title = document.createElement("strong");
        title.textContent = date;
        var sum = document.createElement("span");
        sum.textContent = formatNumber(group.length) + " 条 · " + formatScore(sumScore(group)) + " 分";
        head.appendChild(title);
        head.appendChild(sum);
        section.appendChild(head);

        group.forEach(function(item) {
          section.appendChild(createDetailRow(item));
        });
        detailList.appendChild(section);
      });
    }

    function createDetailRow(item) {
      var row = document.createElement("div");
      row.className = "detail-row source-" + safeClass(item.source || "room");

      var time = document.createElement("div");
      var tag = document.createElement("span");
      tag.className = "source-tag";
      tag.textContent = item.source_label || sourceLabel(item.source);
      time.appendChild(tag);
      var t = document.createElement("div");
      t.className = "time-text";
      t.textContent = item.event_time || "-";
      time.appendChild(t);
      row.appendChild(time);

      var sender = document.createElement("div");
      sender.appendChild(textBlock(item.sender_name || "未知用户", senderMeta(item)));
      row.appendChild(sender);

      var gift = document.createElement("div");
      gift.className = "gift-cell";
      if (item.gift_icon_url) {
        var img = document.createElement("img");
        img.className = "gift-icon";
        img.src = item.gift_icon_url;
        img.alt = "";
        img.loading = "lazy";
        img.referrerPolicy = "no-referrer";
        gift.appendChild(img);
      }
      gift.appendChild(textBlock(item.gift_name || "-", "x " + formatNumber(item.gift_count || 0) + " · 单个 " + formatScore(item.unit_score || 0)));
      row.appendChild(gift);

      var score = document.createElement("div");
      var main = document.createElement("div");
      main.className = "score-text";
      main.textContent = formatScore(item.total_score || 0);
      var sub = document.createElement("div");
      sub.className = "secondary-text";
      sub.textContent = item.gift_id ? "礼物ID " + item.gift_id : "";
      score.appendChild(main);
      score.appendChild(sub);
      row.appendChild(score);

      var fulfillment = document.createElement("div");
      fulfillment.className = "fulfillment-cell";
      fulfillment.appendChild(fulfillmentBlock(item));
      if (item.source === "live") {
        var actions = document.createElement("div");
        actions.className = "fulfillment-actions";
        var editBtn = document.createElement("button");
        editBtn.className = "edit-business-btn";
        editBtn.type = "button";
        editBtn.textContent = "编辑";
        editBtn.addEventListener("click", function() {
          openBusinessModal(item);
        });
        actions.appendChild(editBtn);
        fulfillment.appendChild(actions);
      }
      row.appendChild(fulfillment);

      var context = document.createElement("div");
      context.className = "context-cell";
      context.appendChild(textBlock(contextPrimary(item), contextSecondary(item)));
      row.appendChild(context);
      return row;
    }

    function textBlock(primary, secondary) {
      var wrap = document.createElement("div");
      var p = document.createElement("div");
      p.className = "primary-text";
      p.textContent = primary || "-";
      wrap.appendChild(p);
      if (secondary) {
        var s = document.createElement("div");
        s.className = "secondary-text";
        s.textContent = secondary;
        wrap.appendChild(s);
      }
      return wrap;
    }

    function fulfillmentBlock(item) {
      var primary = fulfillmentPrimary(item);
      var displayPrimary = primary + businessReviewSuffix(item);
      var wrap = textBlock(displayPrimary, fulfillmentSecondary(item));
      var primaryNode = wrap.querySelector(".primary-text");
      if (primaryNode && item.source === "live" && businessNeedsReview(item)) {
        primaryNode.textContent = primary;
        var note = document.createElement("span");
        note.className = "review-note";
        note.textContent = "（待核实）";
        primaryNode.appendChild(note);
      }
      if (primaryNode) primaryNode.classList.add(fulfillmentToneClass(item, primary));
      return wrap;
    }

    function fulfillmentToneClass(item, primary) {
      if (item.source === "live") {
        if (item.business_status === "redeemed" || primary === "已兑换业务") return "is-complete";
        if (item.business_status === "uncertain" || primary === "待人工核实") return "is-uncertain";
        return "is-pending";
      }
      return item.room_has_reply || primary === "已回复" ? "is-complete" : "is-pending";
    }

    function businessNeedsReview(item) {
      if (item.source !== "live") return false;
      var review = item.business_review_status || "";
      var status = item.business_status || "";
      return review === "pending_review" || status === "uncertain";
    }

    function businessReviewSuffix(item) {
      return businessNeedsReview(item) ? "（待核实）" : "";
    }

    function contextPrimary(item) {
      if (item.source === "live") {
        return item.live_title || item.live_bj_time || "直播弹幕";
      }
      return item.message_id ? "房间消息" : "房间记录";
    }

    function fulfillmentPrimary(item) {
      if (item.fulfillment_label) return item.fulfillment_label;
      if (item.source === "live") return "待分析";
      return item.room_has_reply ? "已回复" : "未回复";
    }

    function fulfillmentSecondary(item) {
      if (item.source === "live") {
        if (item.business_status === "redeemed") {
          var businessParts = [];
          if (item.business_type) businessParts.push(item.business_type);
          if (item.business_content) businessParts.push(item.business_content);
          if (item.business_offset) businessParts.push("弹幕 " + item.business_offset);
          return businessParts.join(" · ");
        }
        if (item.business_status === "uncertain") {
          return item.business_content || item.business_evidence || item.business_analysis_reasoning || item.fulfillment_detail || "";
        }
        return item.fulfillment_detail && item.fulfillment_detail !== "未兑换业务" ? item.fulfillment_detail : "";
      }
      var parts = [];
      if (item.room_reply_count) parts.push(formatNumber(item.room_reply_count) + " 条");
      if (item.room_first_reply_time) parts.push(item.room_first_reply_time);
      if (item.room_first_reply_content) parts.push(item.room_first_reply_content);
      return parts.join(" · ");
    }

    function contextSecondary(item) {
      if (item.source === "live") {
        var parts = [];
        if (item.live_bj_time) parts.push(item.live_bj_time);
        if (item.danmu_offset) parts.push("弹幕 " + item.danmu_offset);
        if (item.live_id) parts.push("live_id " + item.live_id);
        return parts.join(" · ");
      }
      var roomParts = [];
      if (item.server_id) roomParts.push("服务端 " + item.server_id);
      if (item.source_jsonl_lineno) roomParts.push("行 " + item.source_jsonl_lineno);
      return roomParts.join(" · ");
    }

    function renderLoadState() {
      var text = "已加载 " + formatNumber(loadedItems.length) + " / " + formatNumber(totalItems) + " 条";
      if (hasMore) text += "，继续向下滚动";
      loadMoreState.textContent = text;
    }

    function setLoadMoreText(text) {
      loadMoreState.textContent = text;
    }

    function renderFilterSummary() {
      resultSummary.textContent = "共 " + formatNumber(totalItems) + " 条，已加载 " + formatNumber(loadedItems.length) + " 条";
      var parts = [sourceText(sourceFilter)];
      if (giftSelect.value) parts.push("礼物：" + giftSelect.value);
      if (senderInput.value.trim()) parts.push("用户：" + senderInput.value.trim());
      if (dateFromInput.value || dateToInput.value) parts.push((dateFromInput.value || "开始") + " 至 " + (dateToInput.value || "结束"));
      activeFilters.textContent = parts.join(" · ");
    }

    function applyFilters() {
      page = 1;
      jumpStatus.textContent = "";
      fetchData({ resetTimer: true });
    }

    function resetFilters() {
      setSource("all");
      giftSelect.value = "";
      senderInput.value = "";
      dateFromInput.value = "";
      dateToInput.value = "";
      jumpDateInput.value = "";
      jumpStatus.textContent = "";
      sortSelect.value = "time_desc";
      page = 1;
      pageSize = 100;
      fetchData({ resetTimer: true });
    }

    function appendItems(items) {
      var seen = {};
      loadedItems.forEach(function(item) {
        seen[item.id || item.event_time + item.gift_name + item.sender_name] = true;
      });
      items.forEach(function(item) {
        var key = item.id || item.event_time + item.gift_name + item.sender_name;
        if (seen[key]) return;
        seen[key] = true;
        loadedItems.push(item);
      });
    }

    function setupInfiniteScroll() {
      if (loadObserver) loadObserver.disconnect();
      if ("IntersectionObserver" in window) {
        loadObserver = new IntersectionObserver(function(entries) {
          if (entries.some(function(entry) { return entry.isIntersecting; })) {
            loadNextPage();
          }
        }, { rootMargin: "650px 0px" });
        loadObserver.observe(loadMoreSentinel);
      }
    }

    function checkNearBottom() {
      if (!pageEl.classList.contains("ready")) return;
      var scrollBottom = window.scrollY + window.innerHeight;
      var docHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
      if (docHeight - scrollBottom < 720) loadNextPage();
    }

    async function jumpToDate() {
      var target = jumpDateInput.value;
      if (!target) return;
      jumpStatus.textContent = "正在跳转到 " + target;
      var section = findDateSection(target);
      if (section) {
        scrollToDateSection(section, target);
        return;
      }
      if (!loadedItems.length) {
        await fetchData({ resetTimer: true });
      }

      while (hasMore) {
        var newest = newestLoadedDate();
        var oldest = oldestLoadedDate();
        if (newest && target > newest) break;
        if (oldest && target > oldest && target < newest) break;
        loadMoreSentinel.scrollIntoView({ behavior: "smooth", block: "end" });
        await sleep(260);
        var loaded = await loadNextPage({ keepMessage: true });
        if (!loaded) break;
        section = findDateSection(target);
        if (section) {
          scrollToDateSection(section, target);
          return;
        }
      }
      section = findDateSection(target);
      if (section) {
        scrollToDateSection(section, target);
        return;
      }
      jumpStatus.textContent = "未找到 " + target + " 的计分礼物";
      renderLoadState();
    }

    function findDateSection(date) {
      return detailList.querySelector('.day-group[data-date="' + date + '"]');
    }

    function scrollToDateSection(section, date) {
      Array.prototype.forEach.call(detailList.querySelectorAll(".jump-highlight"), function(node) {
        node.classList.remove("jump-highlight");
      });
      section.classList.add("jump-highlight");
      section.scrollIntoView({ behavior: "smooth", block: "start" });
      jumpStatus.textContent = "已定位到 " + date;
      renderLoadState();
    }

    function newestLoadedDate() {
      return loadedDateValues().reduce(function(max, date) {
        return !max || date > max ? date : max;
      }, "");
    }

    function oldestLoadedDate() {
      return loadedDateValues().reduce(function(min, date) {
        return !min || date < min ? date : min;
      }, "");
    }

    function loadedDateValues() {
      return loadedItems.map(function(item) {
        return item.date || String(item.event_time || "").slice(0, 10);
      }).filter(Boolean);
    }

    function sleep(ms) {
      return new Promise(function(resolve) {
        window.setTimeout(resolve, ms);
      });
    }

    function setSource(value) {
      sourceFilter = value;
      Array.prototype.forEach.call(sourceSegment.querySelectorAll("button[data-source]"), function(btn) {
        var active = btn.getAttribute("data-source") === value;
        btn.classList.toggle("active", active);
        btn.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function stopRefresh() {
      if (refreshTimer) {
        window.clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function resetRefreshTimer() {
      stopRefresh();
      refreshTimer = window.setInterval(function() {
        fetchData({ resetTimer: false });
      }, Math.max(refreshSeconds, 15) * 1000);
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("zh-CN");
    }

    function formatScore(value) {
      var number = Number(value || 0);
      return number.toLocaleString("zh-CN", { maximumFractionDigits: 6 });
    }

    function maxScore(items) {
      return items.reduce(function(max, item) {
        return Math.max(max, Number(item.total_score || 0));
      }, 0);
    }

    function percent(value, max) {
      if (!max) return 0;
      return Math.max(2, Math.min(100, Number(value || 0) / max * 100));
    }

    function sumScore(items) {
      return items.reduce(function(total, item) {
        return total + Number(item.total_score || 0);
      }, 0);
    }

    function sourceLabel(value) {
      if (value === "live") return "直播";
      if (value === "room") return "房间";
      return "来源";
    }

    function sourceText(value) {
      if (value === "live") return "直播";
      if (value === "room") return "房间";
      return "全部来源";
    }

    function firstSenderId(item) {
      return Array.isArray(item.sender_ids) && item.sender_ids.length ? String(item.sender_ids[0]) : "";
    }

    function senderDisplayName(item) {
      return item.sender_name || item.sender_identifier || firstSenderId(item) || "未知用户";
    }

    function senderMeta(item) {
      if (!item.sender_id) return "";
      var parts = ["ID " + item.sender_id];
      if (item.source === "live" && item.sender_id_source === "room_sender_identity_map") {
        parts.push("昵称映射");
      }
      return parts.join(" · ");
    }

    function safeClass(value) {
      return String(value || "").replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function emptyInline(text) {
      var node = document.createElement("div");
      node.className = "empty show";
      node.textContent = text;
      return node;
    }

    loginBtn.addEventListener("click", doLogin);
    passwordInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") doLogin();
    });
    sourceSegment.addEventListener("click", function(event) {
      var button = event.target.closest("button[data-source]");
      if (!button) return;
      setSource(button.getAttribute("data-source"));
      applyFilters();
    });
    applyBtn.addEventListener("click", applyFilters);
    resetBtn.addEventListener("click", resetFilters);
    openSenderModalBtn.addEventListener("click", openSenderModal);
    senderMoreBar.addEventListener("click", openSenderModal);
    closeSenderModalBtn.addEventListener("click", closeSenderModal);
    senderModalBackdrop.addEventListener("click", closeSenderModal);
    closeBusinessModalBtn.addEventListener("click", closeBusinessModal);
    businessModalBackdrop.addEventListener("click", closeBusinessModal);
    verifyBusinessBtn.addEventListener("click", verifyBusiness);
    businessForm.addEventListener("submit", saveBusinessOverride);
    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeSenderModal();
        closeBusinessModal();
      }
    });
    jumpDateBtn.addEventListener("click", jumpToDate);
    jumpDateInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") jumpToDate();
    });
    [giftSelect, dateFromInput, dateToInput, sortSelect].forEach(function(node) {
      node.addEventListener("change", applyFilters);
    });
    senderInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") applyFilters();
    });
    window.addEventListener("scroll", checkNearBottom, { passive: true });
  })();
  </script>
</body>
</html>
