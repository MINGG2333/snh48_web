<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>房间电台回放 · {{ site_title }}</title>
  <style>
    :root {
      --ink: #362d3c;
      --muted: #837687;
      --line: #eadde8;
      --paper: rgba(255, 255, 255, .92);
      --rose: #a95d8d;
      --rose-dark: #824268;
      --rose-soft: #f5e8f1;
      --small: #6e68a8;
      --warn: #b56b2b;
      --shadow: 0 18px 50px rgba(83, 48, 75, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 4%, rgba(232, 190, 220, .55), transparent 34%),
        radial-gradient(circle at 90% 90%, rgba(195, 197, 239, .45), transparent 36%),
        #f8f3f7;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell { max-width: 1320px; margin: 0 auto; padding: 22px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 18px;
    }
    .brand h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); letter-spacing: -.04em; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .ghost, .primary {
      border: 1px solid var(--line); border-radius: 10px; padding: 9px 14px;
      background: white; color: var(--ink);
    }
    .primary { background: var(--rose); border-color: var(--rose); color: white; }
    .primary:hover { background: var(--rose-dark); }
    .login-wrap { min-height: 68vh; display: grid; place-items: center; }
    .login-card {
      width: min(420px, 100%); padding: 30px; background: var(--paper);
      border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow);
    }
    .login-icon { font-size: 42px; }
    .login-card h2 { margin: 10px 0 8px; }
    .login-card p { color: var(--muted); line-height: 1.7; }
    .login-card input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px;
      outline: none; background: white;
    }
    .login-card input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-soft); }
    .login-card button { width: 100%; margin-top: 12px; padding: 12px; }
    .error { min-height: 22px; margin-top: 10px; color: #b33a4d; font-size: 13px; }
    .app { display: grid; grid-template-columns: 330px minmax(0, 1fr); gap: 18px; }
    .panel {
      background: var(--paper); border: 1px solid var(--line); border-radius: 18px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .sidebar { min-height: 72vh; }
    .sidebar-head { padding: 16px; border-bottom: 1px solid var(--line); }
    .sidebar-head select {
      width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
      background: white;
    }
    .session-list { max-height: calc(100vh - 190px); overflow: auto; padding: 8px; }
    .session-item {
      width: 100%; padding: 13px; border: 0; border-radius: 12px; background: transparent;
      text-align: left; color: inherit; display: block;
    }
    .session-item:hover { background: #fbf5f9; }
    .session-item.active { background: var(--rose-soft); box-shadow: inset 3px 0 var(--rose); }
    .session-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .session-date { font-weight: 700; }
    .tag { display: inline-flex; padding: 3px 8px; border-radius: 999px; font-size: 12px; background: #f0e4ec; }
    .tag.small { background: #e8e7f7; color: #57508e; }
    .session-meta { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .empty { padding: 34px 18px; color: var(--muted); text-align: center; line-height: 1.8; }
    .detail { min-height: 72vh; }
    .hero { padding: 22px; border-bottom: 1px solid var(--line); }
    .hero-line { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .hero h2 { margin: 0; font-size: 24px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .stat { padding: 8px 11px; background: #faf6f9; border-radius: 10px; font-size: 13px; }
    .warning { color: var(--warn); }
    .player-box { padding: 14px; background: linear-gradient(120deg, #382d3a, #5d4057); border-radius: 14px; color: white; }
    audio { width: 100%; margin-top: 10px; }
    .player-info { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; font-size: 13px; opacity: .9; }
    .participants { color: var(--muted); font-size: 13px; margin-top: 12px; }
    .messages-head {
      position: sticky; top: 0; z-index: 2; display: flex; justify-content: space-between;
      padding: 13px 18px; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--line);
    }
    .messages { height: min(54vh, 620px); overflow: auto; padding: 14px 18px 24px; }
    .message {
      display: grid; grid-template-columns: 70px minmax(0, 1fr); gap: 10px; padding: 10px;
      border-radius: 12px; transition: .15s ease;
    }
    .message:hover { background: #fbf6fa; }
    .message.current { background: var(--rose-soft); box-shadow: inset 3px 0 var(--rose); }
    .message.gap { opacity: .62; }
    .message-time { border: 0; background: transparent; color: var(--rose-dark); padding: 0; text-align: left; font-variant-numeric: tabular-nums; }
    .message-time:disabled { color: var(--muted); cursor: default; }
    .sender { font-weight: 700; font-size: 13px; }
    .content { margin-top: 4px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .message-note { margin-top: 4px; color: var(--warn); font-size: 11px; }
    [hidden] { display: none !important; }
    @media (max-width: 820px) {
      .shell { padding: 14px; }
      .app { grid-template-columns: 1fr; }
      .sidebar { min-height: 0; }
      .session-list { max-height: 280px; }
      .detail { min-height: 60vh; }
      .messages { height: 54vh; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>房间电台回放</h1>
        <p>陈嘉仪公开房间与小房间上麦录音 · 同期消息时间轴</p>
      </div>
      <button id="logoutBtn" class="ghost" type="button" hidden data-track="room_voice_logout">退出</button>
    </header>

    <section id="loginWrap" class="login-wrap">
      <form id="loginForm" class="login-card">
        <div class="login-icon">📻</div>
        <h2>进入私密回放</h2>
        <p>页面和音频都需要密码验证；小房间内容不会通过公开静态地址提供。</p>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入访问密码" required>
        <button class="primary" type="submit">验证并进入</button>
        <div id="loginError" class="error" role="alert"></div>
      </form>
    </section>

    <section id="app" class="app" hidden>
      <aside class="panel sidebar">
        <div class="sidebar-head">
          <select id="roomFilter" aria-label="房间筛选">
            <option value="all">全部房间</option>
            <option value="main">公开房间</option>
            <option value="small">小房间</option>
          </select>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>
      <section class="panel detail">
        <div id="detailEmpty" class="empty">选择一场上麦回放，即可收听录音并查看同期消息。</div>
        <div id="detailContent" hidden>
          <div class="hero">
            <div class="hero-line">
              <h2 id="sessionHeading"></h2>
              <span id="roomTag" class="tag"></span>
            </div>
            <div id="stats" class="stats"></div>
            <div class="player-box">
              <div class="player-info">
                <span id="segmentLabel">音频分段</span>
                <span id="timelineLabel">00:00 / 00:00</span>
              </div>
              <audio id="audioPlayer" controls preload="metadata"></audio>
            </div>
            <div id="participants" class="participants"></div>
          </div>
          <div class="messages-head">
            <strong>同期消息</strong>
            <span id="messageCount"></span>
          </div>
          <div id="messages" class="messages"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/js/tracker.js?v={{ static_version('js/tracker.js') }}"></script>
  <script>
    "use strict";
    const API = "/api/room-voice-replays";
    const loginWrap = document.getElementById("loginWrap");
    const app = document.getElementById("app");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");
    const roomFilter = document.getElementById("roomFilter");
    const sessionList = document.getElementById("sessionList");
    const detailEmpty = document.getElementById("detailEmpty");
    const detailContent = document.getElementById("detailContent");
    const audioPlayer = document.getElementById("audioPlayer");
    const messagesBox = document.getElementById("messages");

    let sessions = [];
    let currentSessionId = "";
    let currentSession = null;
    let currentMessages = [];
    let currentSegmentIndex = -1;
    let currentMessageIndex = -1;

    function track(eventType, data) {
      if (!window._trackEvent) return;
      window._trackEvent(eventType, Object.assign({ area: "room_voice_replays" }, data || {}));
    }

    async function api(path, options) {
      const response = await fetch(API + path, Object.assign({ credentials: "same-origin" }, options || {}));
      let body = {};
      try { body = await response.json(); } catch (_) {}
      if (!response.ok) {
        const error = new Error(body.detail || "请求失败");
        error.status = response.status;
        throw error;
      }
      return body;
    }

    function showLogin(message) {
      loginWrap.hidden = false;
      app.hidden = true;
      logoutBtn.hidden = true;
      loginError.textContent = message || "";
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
    }

    function showApp() {
      loginWrap.hidden = true;
      app.hidden = false;
      logoutBtn.hidden = false;
      loginError.textContent = "";
    }

    function timeLabel(seconds) {
      const total = Math.max(0, Math.floor(Number(seconds) || 0));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      return (hours ? String(hours).padStart(2, "0") + ":" : "")
        + String(minutes).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function dateLabel(value) {
      if (!value) return "未知时间";
      return String(value).replace("T", " ").replace(/\.\d{3}\+08:00$/, "");
    }

    function addText(parent, tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      node.textContent = text == null ? "" : String(text);
      parent.appendChild(node);
      return node;
    }

    function renderSessions() {
      sessionList.replaceChildren();
      const filtered = sessions.filter(item => roomFilter.value === "all" || item.room_type === roomFilter.value);
      if (!filtered.length) {
        addText(sessionList, "div", "empty", "暂时还没有符合条件的上麦回放。\n服务会在下次上麦时自动录制。");
        return;
      }
      filtered.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "session-item" + (item.session_id === currentSessionId ? " active" : "");
        const title = document.createElement("div");
        title.className = "session-title";
        addText(title, "span", "session-date", dateLabel(item.detected_start_at_bj));
        const tag = addText(title, "span", "tag" + (item.room_type === "small" ? " small" : ""), item.room_label || "房间");
        tag.title = item.room_type || "";
        button.appendChild(title);
        addText(
          button, "div", "session-meta",
          "录音 " + timeLabel(item.audio_duration_seconds) + " · "
          + (item.message_count || 0) + " 条消息 · " + (item.segment_count || 0) + " 段"
        );
        button.addEventListener("click", () => loadSession(item.session_id));
        sessionList.appendChild(button);
      });
    }

    async function loadSessions() {
      try {
        const body = await api("/sessions");
        sessions = Array.isArray(body.sessions) ? body.sessions : [];
        showApp();
        renderSessions();
        if (sessions.length && !currentSessionId) await loadSession(sessions[0].session_id);
      } catch (error) {
        if (error.status === 401 || error.status === 403) showLogin("");
        else showLogin(error.message);
      }
    }

    function messageText(item) {
      const text = String(item.text_content || "").trim();
      if (text) return text;
      if (item.gift_name) return "礼物：" + item.gift_name + (item.gift_count ? " × " + item.gift_count : "");
      if (item.media_url) return "[" + (item.msg_type || "媒体消息") + "]";
      return "[" + (item.msg_type || "消息") + "]";
    }

    function renderMessages() {
      messagesBox.replaceChildren();
      document.getElementById("messageCount").textContent = currentMessages.length + " 条";
      if (!currentMessages.length) {
        addText(messagesBox, "div", "empty", "这场上麦期间没有采集到房间消息。");
        return;
      }
      currentMessages.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "message" + (item.audio_covered ? "" : " gap");
        row.dataset.index = String(index);
        const seek = document.createElement("button");
        seek.type = "button";
        seek.className = "message-time";
        seek.textContent = timeLabel((item.offset_ms || 0) / 1000);
        seek.disabled = !item.audio_covered || !item.segment_no;
        seek.addEventListener("click", () => seekToMessage(item));
        row.appendChild(seek);
        const body = document.createElement("div");
        addText(body, "div", "sender", item.sender_name || "未知用户");
        addText(body, "div", "content", messageText(item));
        if (!item.audio_covered) addText(body, "div", "message-note", "该消息位于录音缺口，不能精确跳转");
        row.appendChild(body);
        messagesBox.appendChild(row);
      });
    }

    function setStat(text, warning) {
      return addText(document.getElementById("stats"), "span", "stat" + (warning ? " warning" : ""), text);
    }

    function renderDetail() {
      detailEmpty.hidden = true;
      detailContent.hidden = false;
      document.getElementById("sessionHeading").textContent = dateLabel(currentSession.detected_start_at_bj);
      const roomTag = document.getElementById("roomTag");
      roomTag.textContent = currentSession.room_label || "房间";
      roomTag.className = "tag" + (currentSession.room_type === "small" ? " small" : "");
      const stats = document.getElementById("stats");
      stats.replaceChildren();
      setStat("整场 " + timeLabel(currentSession.wall_duration_seconds));
      setStat("录音 " + timeLabel(currentSession.audio_duration_seconds));
      setStat((currentSession.segment_count || 0) + " 个分段");
      setStat((currentSession.message_count || 0) + " 条消息");
      if (Number(currentSession.estimated_gap_seconds || 0) > 1) {
        setStat("录音缺口约 " + timeLabel(currentSession.estimated_gap_seconds), true);
      }
      const names = (currentSession.participants || []).map(item => item.nickname || item.user_id).filter(Boolean);
      document.getElementById("participants").textContent = names.length
        ? "麦上参与者记录：" + names.join("、")
        : "接口未返回可识别的麦上参与者；已保留房间混音流。";
      renderMessages();
      if ((currentSession.segments || []).length) loadSegment(0, false, 0);
      else {
        audioPlayer.removeAttribute("src");
        document.getElementById("segmentLabel").textContent = "没有可播放音频";
      }
    }

    async function loadSession(sessionId) {
      currentSessionId = sessionId;
      renderSessions();
      try {
        const body = await api("/sessions/" + encodeURIComponent(sessionId));
        currentSession = body.session || {};
        currentMessages = Array.isArray(body.messages) ? body.messages : [];
        currentSegmentIndex = -1;
        currentMessageIndex = -1;
        renderDetail();
        track("admin_filter", { action: "load_room_voice_session", session_id: sessionId, message_count: currentMessages.length });
      } catch (error) {
        if (error.status === 401 || error.status === 403) showLogin("登录已失效，请重新验证。");
        else {
          detailEmpty.hidden = false;
          detailContent.hidden = true;
          detailEmpty.textContent = error.message;
        }
      }
    }

    function loadSegment(index, autoplay, seekSeconds) {
      const segments = currentSession && Array.isArray(currentSession.segments) ? currentSession.segments : [];
      if (index < 0 || index >= segments.length) return;
      currentSegmentIndex = index;
      const segment = segments[index];
      audioPlayer.src = segment.media_url;
      document.getElementById("segmentLabel").textContent = "音频分段 " + (index + 1) + " / " + segments.length;
      const ready = () => {
        audioPlayer.removeEventListener("loadedmetadata", ready);
        if (Number.isFinite(seekSeconds) && seekSeconds > 0) {
          audioPlayer.currentTime = Math.min(seekSeconds, Math.max(0, audioPlayer.duration || seekSeconds));
        }
        if (autoplay) audioPlayer.play().catch(() => {});
        updateTimeline();
      };
      audioPlayer.addEventListener("loadedmetadata", ready);
      audioPlayer.load();
    }

    function wallSeconds() {
      if (!currentSession || currentSegmentIndex < 0) return 0;
      const segment = currentSession.segments[currentSegmentIndex] || {};
      return Number(segment.wall_start_offset_seconds || 0) + Number(audioPlayer.currentTime || 0);
    }

    function updateTimeline() {
      if (!currentSession) return;
      const wall = wallSeconds();
      document.getElementById("timelineLabel").textContent = timeLabel(wall) + " / " + timeLabel(currentSession.wall_duration_seconds);
      let nextIndex = -1;
      for (let index = 0; index < currentMessages.length; index += 1) {
        if (Number(currentMessages[index].offset_ms || 0) / 1000 <= wall) nextIndex = index;
        else break;
      }
      if (nextIndex === currentMessageIndex) return;
      if (currentMessageIndex >= 0) {
        const previous = messagesBox.querySelector('[data-index="' + currentMessageIndex + '"]');
        if (previous) previous.classList.remove("current");
      }
      currentMessageIndex = nextIndex;
      if (nextIndex >= 0) {
        const current = messagesBox.querySelector('[data-index="' + nextIndex + '"]');
        if (current) {
          current.classList.add("current");
          if (!audioPlayer.paused) current.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }
    }

    function seekToMessage(item) {
      const segments = currentSession.segments || [];
      const index = segments.findIndex(segment => Number(segment.segment_no) === Number(item.segment_no));
      if (index < 0) return;
      const segment = segments[index];
      const seek = Math.max(0, Number(item.offset_ms || 0) / 1000 - Number(segment.wall_start_offset_seconds || 0));
      loadSegment(index, true, seek);
    }

    loginForm.addEventListener("submit", async event => {
      event.preventDefault();
      loginError.textContent = "正在验证…";
      track("login_attempt", { action: "submit", result: "pending" });
      try {
        await api("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value })
        });
        passwordInput.value = "";
        track("login_attempt", { action: "submit", result: "success" });
        await loadSessions();
      } catch (error) {
        loginError.textContent = error.message;
        track("login_attempt", { action: "submit", result: "failure" });
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try { await api("/logout", { method: "POST" }); } catch (_) {}
      currentSessionId = "";
      currentSession = null;
      showLogin("已退出。");
    });
    roomFilter.addEventListener("change", () => {
      renderSessions();
      track("admin_filter", { action: "room_type", room_type: roomFilter.value });
    });
    audioPlayer.addEventListener("timeupdate", updateTimeline);
    audioPlayer.addEventListener("ended", () => {
      const count = currentSession && currentSession.segments ? currentSession.segments.length : 0;
      if (currentSegmentIndex + 1 < count) loadSegment(currentSegmentIndex + 1, true, 0);
    });
    loadSessions();
  </script>
</body>
</html>
