<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>房间电台回放 · {{ site_title }}</title>
  <style>
    :root {
      --ink: #362d3c;
      --muted: #837687;
      --line: #eadde8;
      --paper: rgba(255, 255, 255, .92);
      --rose: #a95d8d;
      --rose-dark: #824268;
      --rose-soft: #f5e8f1;
      --small: #6e68a8;
      --warn: #b56b2b;
      --shadow: 0 18px 50px rgba(83, 48, 75, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 4%, rgba(232, 190, 220, .55), transparent 34%),
        radial-gradient(circle at 90% 90%, rgba(195, 197, 239, .45), transparent 36%),
        #f8f3f7;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell { max-width: 1320px; margin: 0 auto; padding: 22px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 18px;
    }
    .brand h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); letter-spacing: -.04em; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .ghost, .primary {
      border: 1px solid var(--line); border-radius: 10px; padding: 9px 14px;
      background: white; color: var(--ink);
    }
    .primary { background: var(--rose); border-color: var(--rose); color: white; }
    .primary:hover { background: var(--rose-dark); }
    .login-wrap { min-height: 68vh; display: grid; place-items: center; }
    .login-card {
      width: min(420px, 100%); padding: 30px; background: var(--paper);
      border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow);
    }
    .login-icon { font-size: 42px; }
    .login-card h2 { margin: 10px 0 8px; }
    .login-card p { color: var(--muted); line-height: 1.7; }
    .login-card input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px;
      outline: none; background: white;
    }
    .login-card input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-soft); }
    .login-card button { width: 100%; margin-top: 12px; padding: 12px; }
    .error { min-height: 22px; margin-top: 10px; color: #b33a4d; font-size: 13px; }
    .app { display: grid; grid-template-columns: 330px minmax(0, 1fr); gap: 18px; }
    .panel {
      background: var(--paper); border: 1px solid var(--line); border-radius: 18px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .sidebar { min-height: 72vh; }
    .sidebar-head { padding: 16px; border-bottom: 1px solid var(--line); }
    .sidebar-head select {
      width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
      background: white;
    }
    .session-list { max-height: calc(100vh - 190px); overflow: auto; padding: 8px; }
    .session-item {
      width: 100%; padding: 13px; border: 0; border-radius: 12px; background: transparent;
      text-align: left; color: inherit; display: block;
    }
    .session-item:hover { background: #fbf5f9; }
    .session-item.active { background: var(--rose-soft); box-shadow: inset 3px 0 var(--rose); }
    .session-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .session-date { font-weight: 700; }
    .tag { display: inline-flex; padding: 3px 8px; border-radius: 999px; font-size: 12px; background: #f0e4ec; }
    .tag.small { background: #e8e7f7; color: #57508e; }
    .session-meta { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .empty { padding: 34px 18px; color: var(--muted); text-align: center; line-height: 1.8; }
    .detail { min-height: 72vh; }
    .hero { padding: 22px; border-bottom: 1px solid var(--line); }
    .hero-line { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .hero h2 { margin: 0; font-size: 24px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .stat { padding: 8px 11px; background: #faf6f9; border-radius: 10px; font-size: 13px; }
    .warning { color: var(--warn); }
    .player-box { padding: 14px; background: linear-gradient(120deg, #382d3a, #5d4057); border-radius: 14px; color: white; }
    audio { width: 100%; margin-top: 10px; }
    .player-info { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; font-size: 13px; opacity: .9; }
    .playback-mode-row { display: flex; flex-wrap: wrap; align-items: center; gap: 9px; margin-top: 11px; }
    .playback-mode-row label { font-size: 13px; font-weight: 700; }
    .playback-mode-row select {
      min-width: 150px; padding: 7px 10px; border: 1px solid rgba(255,255,255,.3);
      border-radius: 9px; background: rgba(255,255,255,.13); color: white;
    }
    .playback-mode-row option { color: var(--ink); background: white; }
    .playback-mode-note { flex: 1 1 260px; color: rgba(255,255,255,.76); font-size: 12px; line-height: 1.5; }
    .playback-status {
      display: flex; align-items: center; gap: 8px; width: fit-content; max-width: 100%;
      margin-top: 10px; padding: 7px 10px; border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px; background: rgba(255,255,255,.12); color: rgba(255,255,255,.92);
      font-size: 12px; line-height: 1.4;
    }
    .playback-status.error { border-color: rgba(255,190,190,.5); background: rgba(135,37,52,.4); }
    .playback-spinner {
      width: 13px; height: 13px; flex: 0 0 auto; border: 2px solid rgba(255,255,255,.35);
      border-top-color: white; border-radius: 50%; animation: playback-spin .8s linear infinite;
    }
    .playback-status.error .playback-spinner { display: none; }
    @keyframes playback-spin { to { transform: rotate(360deg); } }
    .participants { color: var(--muted); font-size: 13px; margin-top: 12px; }
    .messages-head {
      position: sticky; top: 0; z-index: 2; display: flex; justify-content: space-between;
      padding: 13px 18px; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--line);
    }
    .messages { height: min(54vh, 620px); overflow: auto; padding: 14px 18px 24px; }
    .message {
      display: grid; grid-template-columns: 70px minmax(0, 1fr); gap: 10px; padding: 10px;
      border-radius: 12px; transition: .15s ease;
    }
    .message.seekable { cursor: pointer; }
    .message.seekable:hover { background: #fbf6fa; }
    .message.seekable:focus-visible { outline: 2px solid var(--rose); outline-offset: -2px; background: #fbf6fa; }
    .message.current { background: var(--rose-soft); box-shadow: inset 3px 0 var(--rose); }
    .message.gap { opacity: .62; }
    .message-time { color: var(--rose-dark); text-align: left; font-variant-numeric: tabular-nums; }
    .message.gap .message-time { color: var(--muted); }
    .sender { font-weight: 700; font-size: 13px; }
    .content { margin-top: 4px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .message-note { margin-top: 4px; color: var(--warn); font-size: 11px; }
    [hidden] { display: none !important; }
    @media (prefers-reduced-motion: reduce) {
      .playback-spinner { animation-duration: 1.8s; }
    }
    @media (max-width: 820px) {
      .shell { padding: 14px; }
      .app { grid-template-columns: 1fr; }
      .sidebar { min-height: 0; }
      .session-list { max-height: 280px; }
      .detail { min-height: 60vh; }
      .messages { height: 54vh; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>房间电台回放</h1>
        <p>陈嘉仪公开房间与小房间上麦录音 · 同期消息时间轴</p>
      </div>
      <button id="logoutBtn" class="ghost" type="button" hidden data-track="room_voice_logout">退出</button>
    </header>

    <section id="loginWrap" class="login-wrap">
      <form id="loginForm" class="login-card">
        <div class="login-icon">📻</div>
        <h2>进入私密回放</h2>
        <p>页面和音频都需要密码验证；小房间内容不会通过公开静态地址提供。</p>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入访问密码" required>
        <button class="primary" type="submit">验证并进入</button>
        <div id="loginError" class="error" role="alert"></div>
      </form>
    </section>

    <section id="app" class="app" hidden>
      <aside class="panel sidebar">
        <div class="sidebar-head">
          <select id="roomFilter" aria-label="房间筛选">
            <option value="all">全部房间</option>
            <option value="main">公开房间</option>
            <option value="small">小房间</option>
          </select>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>
      <section class="panel detail">
        <div id="detailEmpty" class="empty">选择一场上麦回放，即可收听录音并查看同期消息。</div>
        <div id="detailContent" hidden>
          <div class="hero">
            <div class="hero-line">
              <h2 id="sessionHeading"></h2>
              <span id="roomTag" class="tag"></span>
            </div>
            <div id="stats" class="stats"></div>
            <div class="player-box">
              <div class="player-info">
                <span id="segmentLabel">音频分段</span>
                <span id="timelineLabel">00:00 / 00:00</span>
              </div>
              <div class="playback-mode-row">
                <label for="playbackMode">播放模式</label>
                <select id="playbackMode">
                  <option value="compatible">兼容播放（推荐）</option>
                  <option value="original">原始音质</option>
                </select>
                <span id="playbackModeNote" class="playback-mode-note"></span>
              </div>
              <div id="playbackStatus" class="playback-status" role="status" aria-live="polite" hidden>
                <span class="playback-spinner" aria-hidden="true"></span>
                <span id="playbackStatusText"></span>
              </div>
              <audio id="audioPlayer" controls preload="metadata"></audio>
            </div>
            <div id="participants" class="participants"></div>
          </div>
          <div class="messages-head">
            <strong>同期消息</strong>
            <span><span id="messageCount"></span> · 点击有录音的消息跳转</span>
          </div>
          <div id="messages" class="messages"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/js/tracker.js?v={{ static_version('js/tracker.js') }}"></script>
  <script>
    "use strict";
    const API = "/api/room-voice-replays";
    const loginWrap = document.getElementById("loginWrap");
    const app = document.getElementById("app");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");
    const roomFilter = document.getElementById("roomFilter");
    const sessionList = document.getElementById("sessionList");
    const detailEmpty = document.getElementById("detailEmpty");
    const detailContent = document.getElementById("detailContent");
    const audioPlayer = document.getElementById("audioPlayer");
    const playbackModeSelect = document.getElementById("playbackMode");
    const playbackModeNote = document.getElementById("playbackModeNote");
    const playbackStatus = document.getElementById("playbackStatus");
    const playbackStatusText = document.getElementById("playbackStatusText");
    const messagesBox = document.getElementById("messages");

    let sessions = [];
    let currentSessionId = "";
    let currentSession = null;
    let currentMessages = [];
    let currentSegmentIndex = -1;
    let currentMessageIndex = -1;
    let playbackMode = "compatible";
    let segmentLoadToken = 0;
    let playbackStatusToken = 0;
    let playbackStatusTimer = null;
    let pendingSeekWallSeconds = null;
    let pendingSeekSource = "";
    let pendingPlaySource = "";
    let suppressPauseTrackingUntil = 0;
    let seekFromWallSeconds = null;
    let lastPlaybackWallSeconds = 0;

    function track(eventType, data) {
      if (!window._trackEvent) return;
      window._trackEvent(eventType, Object.assign({ area: "room_voice_replays" }, data || {}));
    }

    function playbackTrackPayload(action, extra) {
      const segments = currentSession && Array.isArray(currentSession.segments)
        ? currentSession.segments : [];
      const segment = currentSegmentIndex >= 0 ? (segments[currentSegmentIndex] || {}) : {};
      return Object.assign({
        action: action,
        session_id: currentSessionId || "",
        segment_no: Number(segment.segment_no || 0),
        playback_mode: playbackMode,
        position_seconds: Math.floor(wallSeconds()),
        duration_seconds: Math.floor(Number(currentSession && currentSession.wall_duration_seconds) || 0)
      }, extra || {});
    }

    async function api(path, options) {
      const response = await fetch(API + path, Object.assign({ credentials: "same-origin" }, options || {}));
      let body = {};
      try { body = await response.json(); } catch (_) {}
      if (!response.ok) {
        const error = new Error(body.detail || "请求失败");
        error.status = response.status;
        throw error;
      }
      return body;
    }

    function showLogin(message) {
      loginWrap.hidden = false;
      app.hidden = true;
      logoutBtn.hidden = true;
      loginError.textContent = message || "";
      if (!audioPlayer.paused && !audioPlayer.ended) suppressPauseTrackingUntil = Date.now() + 1000;
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
      hidePlaybackStatus();
    }

    function showApp() {
      loginWrap.hidden = true;
      app.hidden = false;
      logoutBtn.hidden = false;
      loginError.textContent = "";
    }

    function timeLabel(seconds) {
      const total = Math.max(0, Math.floor(Number(seconds) || 0));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      return (hours ? String(hours).padStart(2, "0") + ":" : "")
        + String(minutes).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function dateLabel(value) {
      if (!value) return "未知时间";
      return String(value).replace("T", " ").replace(/\.\d{3}\+08:00$/, "");
    }

    function showPlaybackStatus(message, state, slowMessage) {
      const token = ++playbackStatusToken;
      if (playbackStatusTimer) window.clearTimeout(playbackStatusTimer);
      playbackStatus.className = "playback-status" + (state === "error" ? " error" : "");
      playbackStatusText.textContent = message;
      playbackStatus.hidden = false;
      playbackStatusTimer = null;
      if (state !== "error") {
        playbackStatusTimer = window.setTimeout(() => {
          if (token !== playbackStatusToken || playbackStatus.hidden) return;
          playbackStatusText.textContent = slowMessage || "加载时间较长，请继续等待…";
        }, 12000);
      }
    }

    function hidePlaybackStatus() {
      playbackStatusToken += 1;
      if (playbackStatusTimer) window.clearTimeout(playbackStatusTimer);
      playbackStatusTimer = null;
      playbackStatus.hidden = true;
      playbackStatusText.textContent = "";
    }

    function showSeekStatus(targetWallSeconds) {
      pendingSeekWallSeconds = Math.max(0, Number(targetWallSeconds) || 0);
      showPlaybackStatus(
        "正在跳转到 " + timeLabel(pendingSeekWallSeconds) + "…",
        "loading",
        "跳转加载时间较长，请继续等待…"
      );
    }

    function addText(parent, tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      node.textContent = text == null ? "" : String(text);
      parent.appendChild(node);
      return node;
    }

    function renderSessions() {
      sessionList.replaceChildren();
      const filtered = sessions.filter(item => roomFilter.value === "all" || item.room_type === roomFilter.value);
      if (!filtered.length) {
        addText(sessionList, "div", "empty", "暂时还没有符合条件的上麦回放。\n服务会在下次上麦时自动录制。");
        return;
      }
      filtered.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "session-item" + (item.session_id === currentSessionId ? " active" : "");
        const title = document.createElement("div");
        title.className = "session-title";
        addText(title, "span", "session-date", dateLabel(item.detected_start_at_bj));
        const tag = addText(title, "span", "tag" + (item.room_type === "small" ? " small" : ""), item.room_label || "房间");
        tag.title = item.room_type || "";
        button.appendChild(title);
        addText(
          button, "div", "session-meta",
          "录音 " + timeLabel(item.audio_duration_seconds) + " · "
          + (item.message_count || 0) + " 条消息 · " + (item.segment_count || 0) + " 段"
        );
        button.addEventListener("click", () => loadSession(item.session_id, "user_select"));
        sessionList.appendChild(button);
      });
    }

    async function loadSessions() {
      try {
        const body = await api("/sessions");
        sessions = Array.isArray(body.sessions) ? body.sessions : [];
        showApp();
        renderSessions();
        if (sessions.length && !currentSessionId) await loadSession(sessions[0].session_id, "auto_first");
      } catch (error) {
        if (error.status === 401 || error.status === 403) showLogin("");
        else showLogin(error.message);
      }
    }

    function messageText(item) {
      const text = String(item.text_content || "").trim();
      if (text) return text;
      if (item.gift_name) return "礼物：" + item.gift_name + (item.gift_count ? " × " + item.gift_count : "");
      if (item.media_url) return "[" + (item.msg_type || "媒体消息") + "]";
      return "[" + (item.msg_type || "消息") + "]";
    }

    function renderMessages() {
      messagesBox.replaceChildren();
      document.getElementById("messageCount").textContent = currentMessages.length + " 条";
      if (!currentMessages.length) {
        addText(messagesBox, "div", "empty", "这场上麦期间没有采集到房间消息。");
        return;
      }
      currentMessages.forEach((item, index) => {
        const playable = Boolean(item.audio_covered && item.segment_no && (currentSession.segments || []).some(
          segment => Number(segment.segment_no) === Number(item.segment_no)
        ));
        const row = document.createElement("div");
        row.className = "message" + (playable ? " seekable" : " gap");
        row.dataset.index = String(index);
        if (playable) {
          row.tabIndex = 0;
          row.setAttribute("role", "button");
          row.title = "点击跳转到 " + timeLabel((item.offset_ms || 0) / 1000);
          row.addEventListener("click", event => {
            if (event.target.closest("a, button, input, select, textarea")) return;
            const selection = window.getSelection();
            const hasSelectedText = selection && !selection.isCollapsed && selection.toString().trim()
              && ((selection.anchorNode && row.contains(selection.anchorNode))
                || (selection.focusNode && row.contains(selection.focusNode)));
            if (hasSelectedText) return;
            seekToMessage(item);
          });
          row.addEventListener("keydown", event => {
            if (event.target !== row || (event.key !== "Enter" && event.key !== " ")) return;
            event.preventDefault();
            seekToMessage(item);
          });
        }
        const seek = document.createElement("span");
        seek.className = "message-time";
        seek.textContent = timeLabel((item.offset_ms || 0) / 1000);
        row.appendChild(seek);
        const body = document.createElement("div");
        addText(body, "div", "sender", item.sender_name || "未知用户");
        addText(body, "div", "content", messageText(item));
        if (!playable) addText(body, "div", "message-note", "该消息位于录音缺口，不能精确跳转");
        row.appendChild(body);
        messagesBox.appendChild(row);
      });
    }

    function setStat(text, warning) {
      return addText(document.getElementById("stats"), "span", "stat" + (warning ? " warning" : ""), text);
    }

    function segmentVariant(segment, mode) {
      const variants = segment && segment.variants && typeof segment.variants === "object"
        ? segment.variants : {};
      const selected = variants[mode];
      if (selected && selected.media_url) return selected;
      if (mode === "compatible" && segment && segment.media_url) {
        return { media_url: segment.media_url, label: "兼容播放" };
      }
      return null;
    }

    function sessionSupportsMode(mode) {
      const segments = currentSession && Array.isArray(currentSession.segments)
        ? currentSession.segments : [];
      return segments.length > 0 && segments.every(segment => Boolean(segmentVariant(segment, mode)));
    }

    function updatePlaybackModeControl() {
      const originalOption = playbackModeSelect.querySelector('option[value="original"]');
      const originalAvailable = sessionSupportsMode("original");
      originalOption.disabled = !originalAvailable;
      if (playbackMode === "original" && !originalAvailable) playbackMode = "compatible";
      playbackModeSelect.value = playbackMode;
      playbackModeNote.textContent = playbackMode === "original"
        ? "保留口袋48原始编码，不做二次有损转码；部分设备可能仍然只有左耳有声。"
        : "AAC-LC 单声道兼容版，耳机会从左右两边播放。";
      playbackModeSelect.title = originalAvailable
        ? "可在兼容播放与原始音质之间切换"
        : "这场旧回放暂时只有兼容播放版本";
    }

    function renderDetail() {
      detailEmpty.hidden = true;
      detailContent.hidden = false;
      document.getElementById("sessionHeading").textContent = dateLabel(currentSession.detected_start_at_bj);
      const roomTag = document.getElementById("roomTag");
      roomTag.textContent = currentSession.room_label || "房间";
      roomTag.className = "tag" + (currentSession.room_type === "small" ? " small" : "");
      const stats = document.getElementById("stats");
      stats.replaceChildren();
      setStat("整场 " + timeLabel(currentSession.wall_duration_seconds));
      setStat("录音 " + timeLabel(currentSession.audio_duration_seconds));
      setStat((currentSession.segment_count || 0) + " 个分段");
      setStat((currentSession.message_count || 0) + " 条消息");
      if (Number(currentSession.estimated_gap_seconds || 0) > 1) {
        setStat("录音缺口约 " + timeLabel(currentSession.estimated_gap_seconds), true);
      }
      const names = (currentSession.participants || []).map(item => item.nickname || item.user_id).filter(Boolean);
      document.getElementById("participants").textContent = names.length
        ? "麦上参与者记录：" + names.join("、")
        : "接口未返回可识别的麦上参与者；已保留房间混音流。";
      renderMessages();
      updatePlaybackModeControl();
      if ((currentSession.segments || []).length) loadSegment(0, false, 0);
      else {
        audioPlayer.removeAttribute("src");
        hidePlaybackStatus();
        document.getElementById("segmentLabel").textContent = "没有可播放音频";
      }
    }

    async function loadSession(sessionId, source) {
      currentSessionId = sessionId;
      renderSessions();
      try {
        const body = await api("/sessions/" + encodeURIComponent(sessionId));
        currentSession = body.session || {};
        currentMessages = Array.isArray(body.messages) ? body.messages : [];
        currentSegmentIndex = -1;
        currentMessageIndex = -1;
        pendingSeekSource = "";
        pendingPlaySource = "";
        seekFromWallSeconds = null;
        lastPlaybackWallSeconds = 0;
        playbackMode = currentSession.default_playback_mode === "original" ? "original" : "compatible";
        renderDetail();
        track("admin_filter", {
          action: "load_room_voice_session",
          source: source || "unknown",
          session_id: sessionId,
          room_type: currentSession.room_type || "",
          segment_count: Number(currentSession.segment_count || 0),
          message_count: currentMessages.length
        });
      } catch (error) {
        if (error.status === 401 || error.status === 403) showLogin("登录已失效，请重新验证。");
        else {
          detailEmpty.hidden = false;
          detailContent.hidden = true;
          detailEmpty.textContent = error.message;
        }
      }
    }

    function loadSegment(index, autoplay, seekSeconds, statusMessage, autoplaySource) {
      const segments = currentSession && Array.isArray(currentSession.segments) ? currentSession.segments : [];
      if (index < 0 || index >= segments.length) return;
      currentSegmentIndex = index;
      const segment = segments[index];
      const variant = segmentVariant(segment, playbackMode) || segmentVariant(segment, "compatible");
      if (!variant) return;
      const loadToken = ++segmentLoadToken;
      const targetWallSeconds = Number(segment.wall_start_offset_seconds || 0)
        + Math.max(0, Number(seekSeconds) || 0);
      pendingSeekWallSeconds = Number(seekSeconds) > 0 ? targetWallSeconds : null;
      showPlaybackStatus(
        statusMessage || (pendingSeekWallSeconds == null
          ? "正在加载音频…"
          : "正在跳转到 " + timeLabel(pendingSeekWallSeconds) + "…"),
        "loading",
        pendingSeekWallSeconds == null ? "加载时间较长，请继续等待…" : "跳转加载时间较长，请继续等待…"
      );
      if (!audioPlayer.paused && !audioPlayer.ended) suppressPauseTrackingUntil = Date.now() + 1000;
      audioPlayer.src = variant.media_url;
      document.getElementById("segmentLabel").textContent = "音频分段 " + (index + 1) + " / "
        + segments.length + " · " + (variant.label || (playbackMode === "original" ? "原始音质" : "兼容播放"));
      const ready = () => {
        audioPlayer.removeEventListener("loadedmetadata", ready);
        if (loadToken !== segmentLoadToken) return;
        if (Number.isFinite(seekSeconds) && seekSeconds > 0) {
          if (!pendingSeekSource) pendingSeekSource = autoplaySource || "programmatic";
          audioPlayer.currentTime = Math.min(seekSeconds, Math.max(0, audioPlayer.duration || seekSeconds));
        }
        if (autoplay) {
          const playSource = autoplaySource || "programmatic";
          pendingPlaySource = playSource;
          audioPlayer.play().catch(() => {
            if (pendingPlaySource === playSource) pendingPlaySource = "";
            if (loadToken === segmentLoadToken) hidePlaybackStatus();
          });
        } else if (!(Number.isFinite(seekSeconds) && seekSeconds > 0)) {
          hidePlaybackStatus();
        }
        updateTimeline();
      };
      audioPlayer.addEventListener("loadedmetadata", ready);
      audioPlayer.load();
    }

    function wallSeconds() {
      if (!currentSession || currentSegmentIndex < 0) return 0;
      const segment = currentSession.segments[currentSegmentIndex] || {};
      return Number(segment.wall_start_offset_seconds || 0) + Number(audioPlayer.currentTime || 0);
    }

    function updateTimeline() {
      if (!currentSession) return;
      const wall = wallSeconds();
      document.getElementById("timelineLabel").textContent = timeLabel(wall) + " / " + timeLabel(currentSession.wall_duration_seconds);
      let nextIndex = -1;
      for (let index = 0; index < currentMessages.length; index += 1) {
        if (Number(currentMessages[index].offset_ms || 0) / 1000 <= wall) nextIndex = index;
        else break;
      }
      if (nextIndex === currentMessageIndex) return;
      if (currentMessageIndex >= 0) {
        const previous = messagesBox.querySelector('[data-index="' + currentMessageIndex + '"]');
        if (previous) previous.classList.remove("current");
      }
      currentMessageIndex = nextIndex;
      if (nextIndex >= 0) {
        const current = messagesBox.querySelector('[data-index="' + nextIndex + '"]');
        if (current) {
          current.classList.add("current");
          if (!audioPlayer.paused) current.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }
    }

    function seekToMessage(item) {
      const segments = currentSession.segments || [];
      const index = segments.findIndex(segment => Number(segment.segment_no) === Number(item.segment_no));
      if (index < 0) return;
      const segment = segments[index];
      const seek = Math.max(0, Number(item.offset_ms || 0) / 1000 - Number(segment.wall_start_offset_seconds || 0));
      const targetWallSeconds = Number(item.offset_ms || 0) / 1000;
      const variant = segmentVariant(segment, playbackMode) || segmentVariant(segment, "compatible");
      if (index === currentSegmentIndex && variant && audioPlayer.getAttribute("src") === variant.media_url
          && audioPlayer.readyState >= HTMLMediaElement.HAVE_METADATA) {
        const targetTime = Math.min(seek, Math.max(0, audioPlayer.duration || seek));
        const alreadyAtTarget = Math.abs(Number(audioPlayer.currentTime || 0) - targetTime) < 0.05;
        showSeekStatus(targetWallSeconds);
        if (!alreadyAtTarget) {
          pendingSeekSource = "message_seek";
          audioPlayer.currentTime = targetTime;
        }
        pendingPlaySource = "message_seek";
        audioPlayer.play().then(() => {
          if (alreadyAtTarget) hidePlaybackStatus();
        }).catch(() => {
          if (pendingPlaySource === "message_seek") pendingPlaySource = "";
          hidePlaybackStatus();
        });
      } else {
        pendingSeekSource = "message_seek";
        loadSegment(index, true, seek, "正在跳转到 " + timeLabel(targetWallSeconds) + "…", "message_seek");
      }
      track("admin_filter", {
        action: "room_voice_message_seek",
        session_id: currentSessionId,
        segment_no: Number(item.segment_no),
        offset_seconds: Math.floor(targetWallSeconds)
      });
    }

    loginForm.addEventListener("submit", async event => {
      event.preventDefault();
      loginError.textContent = "正在验证…";
      track("login_attempt", { action: "submit", result: "pending" });
      try {
        await api("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value })
        });
        passwordInput.value = "";
        track("login_attempt", { action: "submit", result: "success" });
        await loadSessions();
      } catch (error) {
        loginError.textContent = error.message;
        track("login_attempt", { action: "submit", result: "failure" });
      }
    });

    logoutBtn.addEventListener("click", async () => {
      track("login_attempt", { action: "logout", result: "submitted" });
      try { await api("/logout", { method: "POST" }); } catch (_) {}
      currentSessionId = "";
      currentSession = null;
      showLogin("已退出。");
    });
    roomFilter.addEventListener("change", () => {
      renderSessions();
      const visibleCount = sessions.filter(item => roomFilter.value === "all" || item.room_type === roomFilter.value).length;
      track("admin_filter", {
        action: "room_type",
        room_type: roomFilter.value,
        visible_session_count: visibleCount
      });
    });
    playbackModeSelect.addEventListener("change", () => {
      const requestedMode = playbackModeSelect.value === "original" ? "original" : "compatible";
      if (requestedMode === playbackMode || !sessionSupportsMode(requestedMode)) {
        updatePlaybackModeControl();
        return;
      }
      const segmentIndex = currentSegmentIndex;
      const seekSeconds = Number(audioPlayer.currentTime || 0);
      const autoplay = !audioPlayer.paused && !audioPlayer.ended;
      playbackMode = requestedMode;
      updatePlaybackModeControl();
      if (seekSeconds > 0) pendingSeekSource = "playback_mode";
      if (segmentIndex >= 0) loadSegment(
        segmentIndex, autoplay, seekSeconds, "正在切换播放模式…", "playback_mode"
      );
      track("admin_filter", playbackTrackPayload("room_voice_playback_mode"));
    });
    audioPlayer.addEventListener("timeupdate", () => {
      updateTimeline();
      if (!audioPlayer.seeking) lastPlaybackWallSeconds = wallSeconds();
    });
    audioPlayer.addEventListener("seeking", () => {
      if (seekFromWallSeconds == null) seekFromWallSeconds = lastPlaybackWallSeconds;
      if (!pendingSeekSource) pendingSeekSource = "player_control";
      showSeekStatus(wallSeconds());
      updateTimeline();
    });
    audioPlayer.addEventListener("seeked", () => {
      const targetWallSeconds = wallSeconds();
      track("click", playbackTrackPayload("room_voice_seek", {
        source: pendingSeekSource || "player_control",
        from_position_seconds: Math.floor(Number(seekFromWallSeconds) || 0),
        to_position_seconds: Math.floor(targetWallSeconds)
      }));
      pendingSeekSource = "";
      seekFromWallSeconds = null;
      lastPlaybackWallSeconds = targetWallSeconds;
      pendingSeekWallSeconds = null;
      hidePlaybackStatus();
      updateTimeline();
    });
    audioPlayer.addEventListener("waiting", () => {
      if (audioPlayer.seeking && pendingSeekWallSeconds != null) {
        showSeekStatus(pendingSeekWallSeconds);
      } else {
        showPlaybackStatus("正在加载音频…", "loading", "加载时间较长，请继续等待…");
      }
    });
    audioPlayer.addEventListener("canplay", hidePlaybackStatus);
    audioPlayer.addEventListener("play", () => {
      const source = pendingPlaySource || "player_control";
      pendingPlaySource = "";
      suppressPauseTrackingUntil = 0;
      if (source !== "auto_next_segment" && source !== "programmatic") {
        track("click", playbackTrackPayload("room_voice_play", { source: source }));
      }
    });
    audioPlayer.addEventListener("pause", () => {
      if (currentSession && !audioPlayer.ended && Date.now() > suppressPauseTrackingUntil) {
        track("click", playbackTrackPayload("room_voice_pause", { source: "player_control" }));
      }
    });
    audioPlayer.addEventListener("playing", hidePlaybackStatus);
    audioPlayer.addEventListener("error", () => {
      pendingSeekWallSeconds = null;
      pendingSeekSource = "";
      pendingPlaySource = "";
      seekFromWallSeconds = null;
      showPlaybackStatus("音频加载失败，请重试或切换播放模式。", "error");
    });
    audioPlayer.addEventListener("ended", () => {
      const count = currentSession && currentSession.segments ? currentSession.segments.length : 0;
      track("click", playbackTrackPayload("room_voice_segment_complete", {
        is_session_complete: currentSegmentIndex + 1 >= count
      }));
      if (currentSegmentIndex + 1 < count) {
        loadSegment(currentSegmentIndex + 1, true, 0, "正在加载下一段音频…", "auto_next_segment");
      }
    });
    loadSessions();
  </script>
</body>
</html>
