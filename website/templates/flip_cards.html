<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>翻牌记录 · {{ site_title }}</title>
  <style>
    :root {
      --bg: #101217;
      --surface: #181c24;
      --surface-2: #202633;
      --border: #323a49;
      --text: #edf1f6;
      --muted: #99a4b3;
      --accent: #63c7af;
      --accent-dark: #46a891;
      --bad: #e47777;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .shell {
      width: min(980px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 680;
      letter-spacing: 0;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    .center {
      display: grid;
      place-items: center;
      padding: 24px 0;
    }
    .login-box {
      width: min(380px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 28px;
    }
    .login-box h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 660;
      letter-spacing: 0;
    }
    .login-box p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }
    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d1015;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    .primary {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #08110e;
      font-weight: 700;
    }
    .primary:hover { background: var(--accent-dark); }
    .error {
      min-height: 20px;
      margin-top: 10px;
      color: var(--bad);
      font-size: 13px;
    }
    .loading {
      color: var(--muted);
      font-size: 14px;
    }
    [hidden] { display: none !important; }
    @media (max-width: 600px) {
      .shell { padding: 18px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .status { text-align: left; }
      .login-box { padding: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>翻牌记录</h1>
      <div id="pageStatus" class="status">正在检查登录状态</div>
    </header>

    <section class="center">
      <div id="loading" class="loading">正在载入</div>
      <form id="loginForm" class="login-box" hidden>
        <h2>访问验证</h2>
        <p>翻牌记录和本地音视频都需要密码验证。</p>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入访问密码" required>
        <button class="primary" type="submit" data-track="flip_cards_login_submit">验证并进入</button>
        <div id="loginError" class="error" role="alert"></div>
      </form>
    </section>
  </main>

  <script src="/static/js/tracker.js?v={{ static_version('js/tracker.js') }}"></script>
  <script>
    "use strict";
    const API = "/api/flip-cards";
    const pageStatus = document.getElementById("pageStatus");
    const loading = document.getElementById("loading");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");

    function track(eventType, data) {
      if (!window._trackEvent) return;
      window._trackEvent(eventType, Object.assign({ area: "flip_cards" }, data || {}));
    }

    function showLogin(message) {
      loading.hidden = true;
      loginForm.hidden = false;
      pageStatus.textContent = "需要密码";
      loginError.textContent = message || "";
      passwordInput.focus();
    }

    function showLoading(message) {
      loading.hidden = false;
      loginForm.hidden = true;
      pageStatus.textContent = message || "正在载入";
      loading.textContent = message || "正在载入";
    }

    async function api(path, options) {
      const response = await fetch(API + path, Object.assign({ credentials: "same-origin" }, options || {}));
      let body = {};
      try { body = await response.json(); } catch (_) {}
      if (!response.ok) {
        const error = new Error(body.detail || "请求失败");
        error.status = response.status;
        throw error;
      }
      return body;
    }

    async function openIfReady() {
      try {
        const status = await api("/status");
        if (!status.html_exists) {
          showLogin("翻牌 HTML 尚未生成，请先在数据服务器运行生成脚本。");
          return;
        }
        track("login_attempt", { action: "reuse_cookie", result: "success" });
        window.location.replace(API + "/html");
      } catch (error) {
        if (error.status === 401) {
          showLogin("");
          return;
        }
        showLogin(error.message || "无法载入翻牌记录");
      }
    }

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      const password = passwordInput.value;
      if (!password) return;
      loginError.textContent = "";
      showLoading("正在验证");
      track("login_attempt", { action: "submit", result: "submitted" });
      try {
        await api("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });
        track("login_attempt", { action: "submit", result: "success" });
        await openIfReady();
      } catch (error) {
        track("login_attempt", {
          action: "submit",
          result: "failure",
          status: error.status || 0
        });
        showLogin(error.message || "密码错误");
      } finally {
        passwordInput.value = "";
      }
    });

    openIfReady();
  </script>
</body>
</html>
