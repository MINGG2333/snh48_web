<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site_description }}{% endblock %}">

    <!-- Favicon (random rotation via server) -->
    <link rel="icon" href="/favicon.ico" type="image/png">
    <link rel="shortcut icon" href="/favicon.ico" type="image/png">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block header %}{% endblock %}
    {% block content %}{% endblock %}
    {% block footer %}
    <footer class="site-footer" style="text-align:center;padding:20px;background:var(--glass-bg);border-top:1px solid var(--glass-border);margin-top:40px;">
        <p>
            <i class="far fa-copyright"></i> {{ site_title }} ·
            <a href="/terms" style="color:var(--primary);">服务条款</a> ·
            <a href="/privacy" style="color:var(--primary);">隐私政策</a> ·
            <a href="/complaint" style="color:var(--primary);">投诉举报</a>
        </p>
        {% if site_icp %}
        <p class="footer-icp" style="margin-top:8px;font-size:0.85rem;color:var(--text-dim);">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color:inherit;">{{ site_icp }}</a>
        </p>
        {% endif %}
    </footer>
    {% endblock %}

    <script src="/static/js/main.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
