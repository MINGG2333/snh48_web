{% extends "base.html" %}

{% block title %}时光轴 - {{ site_title }}{% endblock %}

{% block extra_head %}
<style>
/* ── Timeline page specific ── */
.timeline-page {
  padding-top: var(--nav-height);
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255, 107, 157, 0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
    var(--bg-dark);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE WRAPPER & HORIZONTAL AXIS
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.timeline-wrapper:active {
  cursor: grabbing;
}

.timeline-track {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 50vw;
  will-change: transform;
  transition: none;
}

.timeline-wrapper.dragging .timeline-track {
  transition: none !important;
}

/* ── Horizontal axis line ── */
.timeline-axis {
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 2px;
  transform: translateY(-50%);
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255, 107, 157, 0.15) 5%,
    rgba(255, 107, 157, 0.5) 30%,
    var(--primary) 50%,
    var(--accent) 70%,
    rgba(192, 132, 252, 0.3) 95%,
    transparent 100%
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE EVENT COLUMN
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-event {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 220px;
  margin: 0 12px;
  position: relative;
}

/* ── Card (branch off the axis) ── */
.timeline-card {
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  z-index: 10;
}

.timeline-card:hover {
  border-color: rgba(255, 107, 157, 0.35);
  box-shadow: 0 8px 40px rgba(255, 107, 157, 0.2);
  transform: translateY(-3px);
}

.timeline-card-above {
  margin-bottom: 0;
}

.timeline-card-below {
  margin-top: 0;
}

/* Card thumbnail / placeholder */
.timeline-card-img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  display: block;
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(192, 132, 252, 0.1));
}

.timeline-card-img-placeholder {
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: var(--text-dim);
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.08), rgba(192, 132, 252, 0.08));
}

/* Card body */
.timeline-card-body {
  padding: 10px 12px 12px;
}

.timeline-card-date {
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

.timeline-card-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.timeline-card-badge {
  display: inline-block;
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 20px;
  margin-top: 5px;
  font-weight: 500;
}

.timeline-card-badge.milestone { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); }
.timeline-card-badge.tour { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
.timeline-card-badge.show { background: rgba(192, 132, 252, 0.15); color: #c084fc; border: 1px solid rgba(192, 132, 252, 0.2); }
.timeline-card-badge.event { background: rgba(96, 165, 250, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.2); }
.timeline-card-badge.external { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.2); }

/* ── Connector line (card ↔ node) ── */
.timeline-connector {
  width: 2px;
  flex-shrink: 0;
  position: relative;
  z-index: 3;
}

.timeline-connector-above {
  height: 18px;
  background: linear-gradient(180deg, rgba(255, 107, 157, 0.3), rgba(255, 107, 157, 0.6));
}

.timeline-connector-below {
  height: 18px;
  background: linear-gradient(180deg, rgba(192, 132, 252, 0.6), rgba(192, 132, 252, 0.3));
}

/* ── Node dot on the axis ── */
.timeline-node {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--primary);
  border: 3px solid var(--bg-dark);
  box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.4), 0 0 12px rgba(255, 107, 157, 0.3);
  flex-shrink: 0;
  position: relative;
  z-index: 6;
  transition: all 0.3s ease;
}

.timeline-event:hover .timeline-node {
  box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.6), 0 0 20px rgba(255, 107, 157, 0.5);
  transform: scale(1.2);
}

/* Date label near the node */
.timeline-node-date {
  position: absolute;
  top: 50%;
  white-space: nowrap;
  font-size: 0.65rem;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.3px;
  pointer-events: none;
  z-index: 5;
}

/* Card-above events: date below node */
.timeline-event-above .timeline-node-date {
  left: 24px;
  transform: translateY(-50%);
}

/* Card-below events: date above node */
.timeline-event-below .timeline-node-date {
  left: 24px;
  transform: translateY(-50%);
}

/* ── "今天" marker ── */
.timeline-today-marker {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.6rem;
  color: #4ade80;
  background: rgba(74, 222, 128, 0.15);
  border: 1px solid rgba(74, 222, 128, 0.3);
  padding: 1px 6px;
  border-radius: 10px;
  left: 42px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCROLL HINT
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-hint {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-dim);
  font-size: 0.78rem;
  opacity: 0.7;
  animation: hintBounce 2s ease-in-out infinite;
  pointer-events: none;
}

.timeline-hint i {
  font-size: 1.2rem;
}

@keyframes hintBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
  50% { transform: translateX(-50%) translateY(6px); opacity: 0.4; }
}

.timeline-hint.dim {
  opacity: 0 !important;
  transition: opacity 0.5s;
}

/* ── Zoom controls ── */
.timeline-zoom-controls {
  position: absolute;
  top: 20px;
  right: 24px;
  z-index: 10;
  display: flex;
  gap: 6px;
}

.timeline-zoom-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.timeline-zoom-btn:hover {
  background: rgba(255, 107, 157, 0.15);
  border-color: var(--primary);
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE MODAL
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.timeline-modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.timeline-modal {
  background: linear-gradient(135deg, rgba(20, 10, 30, 0.95), rgba(10, 10, 26, 0.95));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 107, 157, 0.2);
  border-radius: 20px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 107, 157, 0.1);
  transform: scale(0.9) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.timeline-modal-overlay.open .timeline-modal {
  transform: scale(1) translateY(0);
}

.timeline-modal-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 20px 20px 0 0;
  display: block;
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(192, 132, 252, 0.1));
}

.timeline-modal-img-placeholder {
  width: 100%;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  color: var(--text-dim);
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.08), rgba(192, 132, 252, 0.08));
  border-radius: 20px 20px 0 0;
}

.timeline-modal-body {
  padding: 24px;
}

.timeline-modal-date {
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.timeline-modal-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.timeline-modal-badge {
  display: inline-block;
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
  font-weight: 500;
}

.timeline-modal-desc {
  color: var(--text-dim);
  line-height: 1.8;
  font-size: 0.92rem;
}

.timeline-modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.timeline-modal-close:hover {
  background: rgba(255, 107, 157, 0.3);
  border-color: var(--primary);
}

/* ── Responsive ── */
@media (max-width: 768px) {

  .timeline-event { width: 180px; margin: 0 8px; }
  .timeline-card-img, .timeline-card-img-placeholder { height: 65px; }
  .timeline-modal { max-width: 95vw; }
  .timeline-modal-img, .timeline-modal-img-placeholder { height: 160px; }
  .timeline-zoom-controls { top: 10px; right: 12px; }
  .timeline-zoom-btn { width: 30px; height: 30px; font-size: 0.85rem; }
  .timeline-connector-above,
  .timeline-connector-below { height: 14px; }
}
</style>
{% endblock %}

{% block header %}
<nav class="navbar" id="mainNav">
    <div class="nav-container">
        <a href="/" class="nav-logo">
            <i class="fas fa-star"></i> {{ site_title }}
        </a>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> 首页</a>
            <a href="/about"><i class="fas fa-info-circle"></i> 关于</a>
            <a href="/timeline" class="active"><i class="fas fa-clock"></i> 时光轴</a>
            <a href="/qa"><i class="fas fa-robot"></i> AI 问答</a>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="菜单">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>

<!-- Mobile Circular Menu -->
<div class="circular-menu" id="circularMenu">
    <div class="circular-menu-ring">
        <div class="circular-menu-close" id="circularMenuClose">
            <i class="fas fa-times"></i>
        </div>
        <!-- 时光轴 at ~4:30 o'clock (bottom-right) -->
        <a href="/timeline" class="circular-menu-item item-timeline">
            <i class="fas fa-clock"></i>
            <span>时光轴</span>
        </a>
        <!-- AI 问答 at ~6:30 o'clock (bottom center) -->
        <a href="/qa" class="circular-menu-item item-qa">
            <i class="fas fa-robot"></i>
            <span>AI 问答</span>
        </a>
        <!-- 关于 at ~8:30 o'clock (bottom-left) -->
        <a href="/about" class="circular-menu-item item-about">
            <i class="fas fa-info-circle"></i>
            <span>关于</span>
        </a>
    </div>
</div>
{% endblock %}

{% block content %}
<main class="timeline-page">
    <div class="timeline-wrapper" id="timelineWrapper">
        <!-- Horizontal axis line -->
        <div class="timeline-axis"></div>

        <!-- Zoom controls -->
        <div class="timeline-zoom-controls">
            <button class="timeline-zoom-btn" id="zoomIn" title="放大">
                <i class="fas fa-plus"></i>
            </button>
            <button class="timeline-zoom-btn" id="zoomOut" title="缩小">
                <i class="fas fa-minus"></i>
            </button>
        </div>

        <!-- Track -->
        <div class="timeline-track" id="timelineTrack"></div>

        <!-- Hint -->
        <div class="timeline-hint" id="timelineHint">
            <i class="fas fa-arrows-alt-h"></i>
            <span>拖拽滑动</span>
        </div>
    </div>

    <!-- Modal -->
    <div class="timeline-modal-overlay" id="timelineModalOverlay">
        <div class="timeline-modal" id="timelineModal">
            <button class="timeline-modal-close" id="timelineModalClose">
                <i class="fas fa-times"></i>
            </button>
            <div id="timelineModalContent"></div>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/timeline.js?v={{ static_version('js/timeline.js') }}"></script>
{% endblock %}
