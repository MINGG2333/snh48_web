{% extends "base.html" %}

{% block title %}时光轴 - {{ site_title }}{% endblock %}

{% block extra_head %}
<style>
/* ── Timeline page specific ── */
.timeline-page {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255, 107, 157, 0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
    var(--bg-dark);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE WRAPPER & HORIZONTAL AXIS
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.timeline-wrapper:active {
  cursor: grabbing;
}

.timeline-track {
  position: absolute;
  left: 0;
  top: 0;
  right: 0;
  bottom: 0;
}

.timeline-track-inner {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 50vw;
  will-change: transform;
  transition: none;
}

.timeline-wrapper.dragging .timeline-track-inner {
  transition: none !important;
}

/* ── Timeline loading indicator ── */
.timeline-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.timeline-loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,107,157,0.15);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: timeline-spin 0.8s linear infinite;
}
@keyframes timeline-spin { to { transform: rotate(360deg); } }
.timeline-loading.hidden { display: none; }

/* ── Horizontal axis line ── */
.timeline-axis {
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 2px;
  transform: translateY(-50%);
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255, 107, 157, 0.15) 5%,
    rgba(255, 107, 157, 0.5) 30%,
    var(--primary) 50%,
    var(--accent) 70%,
    rgba(192, 132, 252, 0.3) 95%,
    transparent 100%
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE EVENT COLUMN — absolute positioning centers node on axis
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-event {
  flex-shrink: 0;
  width: 220px;
  margin: 0 12px;
  position: relative;
  height: 100%;
}

/* ── Node always at the exact vertical center ── */
.timeline-node {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--primary);
  border: 3px solid var(--bg-dark);
  box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.4), 0 0 12px rgba(255, 107, 157, 0.3);
  z-index: 6;
  transition: all 0.3s ease;
}

.timeline-event:hover .timeline-node {
  box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.6), 0 0 20px rgba(255, 107, 157, 0.5);
  transform: translate(-50%, -50%) scale(1.2);
}

/* ── Date label (default: below node) ── */
.timeline-node-date {
  position: absolute;
  top: calc(50% + 10px);
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  letter-spacing: 0.3px;
  pointer-events: none;
  z-index: 5;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}

/* Card below the axis → date goes above the node */
.timeline-event-below .timeline-node-date {
  top: auto;
  bottom: calc(50% + 10px);
}

.timeline-today-marker {
  display: inline-block;
  font-size: 0.6rem;
  color: #4ade80;
  background: rgba(74, 222, 128, 0.15);
  border: 1px solid rgba(74, 222, 128, 0.3);
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
}

/* ── Connector lines (card ↔ node) ── */
.timeline-connector {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  z-index: 3;
}

.timeline-connector-above {
  bottom: calc(50% + 7px);  /* from center up to bottom of node */
  height: 18px;
  background: linear-gradient(180deg, rgba(255, 107, 157, 0.3), rgba(255, 107, 157, 0.6));
}

.timeline-connector-below {
  top: calc(50% + 7px);  /* from center down to top of node */
  height: 18px;
  background: linear-gradient(180deg, rgba(192, 132, 252, 0.6), rgba(192, 132, 252, 0.3));
}

/* ── Card (branch off the axis) ── */
.timeline-card {
  position: absolute;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
  z-index: 10;
}

.timeline-card:hover {
  border-color: rgba(255, 107, 157, 0.35);
  box-shadow: 0 8px 40px rgba(255, 107, 157, 0.2);
  transform: translateY(-3px);
}

/* Card above: bottom edge connects to top of connector */
.timeline-event-above .timeline-card {
  bottom: calc(50% + 7px + 18px);  /* half-node + connector height */
}

/* Card below: top edge connects to bottom of connector */
.timeline-event-below .timeline-card {
  top: calc(50% + 7px + 18px);  /* half-node + connector height */
}

/* ── Same-day card stack ── */
.timeline-card-stack {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.timeline-event-above .timeline-card-stack {
  bottom: calc(50% + 7px + 18px);
}

.timeline-event-below .timeline-card-stack {
  top: calc(50% + 7px + 18px);
}

.timeline-card-stack .timeline-card {
  position: relative;
  top: auto !important;
  bottom: auto !important;
  width: 100%;
}

.timeline-card-stack .timeline-card-img,
.timeline-card-stack .timeline-card-img-placeholder {
  height: 100px;
}

.timeline-card-stack .timeline-card-body {
  padding: 6px 10px 8px;
}

.timeline-card-stack .timeline-card-title {
  font-size: 0.78rem;
  -webkit-line-clamp: 1;
}

.timeline-card-stack .timeline-card-date {
  font-size: 0.62rem;
}

.timeline-card-stack .timeline-card-badge {
  font-size: 0.55rem;
  padding: 1px 6px;
  margin-top: 3px;
}

/* Card thumbnail / placeholder with loading shimmer */
.timeline-card-img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  object-position: center 20%;
  display: block;
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(192, 132, 252, 0.1));
}

.timeline-card-img.loading {
  background: linear-gradient(
    90deg,
    rgba(255, 107, 157, 0.06) 0%,
    rgba(255, 107, 157, 0.15) 40%,
    rgba(192, 132, 252, 0.15) 60%,
    rgba(255, 107, 157, 0.06) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.timeline-card-img-placeholder {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: var(--text-dim);
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.08), rgba(192, 132, 252, 0.08));
}

/* Card body */
.timeline-card-body {
  padding: 10px 12px 12px;
}

.timeline-card-date {
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

.timeline-card-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.timeline-card-badge {
  display: inline-block;
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 20px;
  margin-top: 5px;
  font-weight: 500;
}

.timeline-card-badge.milestone,
.timeline-modal-badge.milestone { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); }
.timeline-card-badge.tour,
.timeline-modal-badge.tour { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
.timeline-card-badge.show,
.timeline-modal-badge.show { background: rgba(192, 132, 252, 0.15); color: #c084fc; border: 1px solid rgba(192, 132, 252, 0.2); }
.timeline-card-badge.event,
.timeline-modal-badge.event { background: rgba(96, 165, 250, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.2); }
.timeline-card-badge.external,
.timeline-modal-badge.external { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.2); }
.timeline-card-badge.danmu.available,
.timeline-modal-badge.danmu.available { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.2); }
.timeline-card-badge.danmu.missing,
.timeline-modal-badge.danmu.missing { background: rgba(107, 114, 128, 0.15); color: #9ca3af; border: 1px solid rgba(148, 163, 184, 0.2); }



/* ═══════════════════════════════════════════════════════════════════════════
   SCROLL HINT
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-hint {
  position: absolute;
  top: calc(50% + 315px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-dim);
  font-size: 0.78rem;
  opacity: 0.7;
  animation: hintBounce 2s ease-in-out infinite;
  pointer-events: none;
}

.timeline-hint i {
  font-size: 1.2rem;
}

@keyframes hintBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
  50% { transform: translateX(-50%) translateY(6px); opacity: 0.4; }
}

.timeline-hint.dim {
  opacity: 0 !important;
  animation: none !important;
  transition: opacity 0.5s;
}

/* ── Zoom controls ── */
.timeline-zoom-controls {
  position: absolute;
  top: calc(20px + var(--nav-height));
  right: 24px;
  z-index: 1001;
  display: flex;
  gap: 6px;
}

.timeline-zoom-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.timeline-zoom-btn:hover {
  background: rgba(255, 107, 157, 0.15);
  border-color: var(--primary);
}

/* ── Source filter bar ── */
.timeline-filter-bar {
  position: absolute;
  top: calc(20px + var(--nav-height));
  left: 24px;
  z-index: 1001;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 4px 10px;
  min-width: 50px;
}

.timeline-filter-header {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 14px;
  color: var(--text-dim);
  font-size: 0.78rem;
  font-weight: 500;
  user-select: none;
  transition: color 0.2s;
}
.timeline-filter-header:hover { color: var(--text); }
.timeline-filter-header i {
  font-size: 0.65rem;
  transition: transform 0.25s ease;
}
.timeline-filter-header.open i {
  transform: rotate(180deg);
}

.timeline-filter-options {
  display: none;
  flex-direction: column;
  gap: 2px;
  padding-top: 6px;
  margin-top: 4px;
  border-top: 1px solid var(--glass-border);
}
.timeline-filter-options.open {
  display: flex;
}



.timeline-filter-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 0.75rem;
  font-family: inherit;
  padding: 4px 10px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.timeline-filter-btn:hover {
  color: var(--text);
  background: rgba(255, 255, 255, 0.05);
}

.timeline-filter-btn.active {
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(192, 132, 252, 0.2));
  border-color: rgba(255, 107, 157, 0.3);
  color: var(--text);
}

/* ── Custom datepicker ── */
.timeline-date-jump-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 4px;
  padding-left: 8px;
  border-left: 1px solid var(--glass-border);
}

.timeline-datepicker {
  position: relative;
}

.timeline-date-input {
  width: 102px;
  padding: 6px 8px;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 0.78rem;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
  text-align: center;
}

.timeline-date-input:focus,
.timeline-date-input:hover {
  border-color: var(--primary);
}

.timeline-date-input::placeholder {
  color: var(--text-dim);
  opacity: 0.5;
}

/* ── Popup calendar ── */
.timeline-datepicker-popup {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  width: 250px;
  background: linear-gradient(135deg, rgba(20, 10, 30, 0.98), rgba(10, 10, 26, 0.98));
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 107, 157, 0.2);
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 107, 157, 0.1);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px) scale(0.95);
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.timeline-datepicker-popup.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

/* Header: month navigation */
.datepicker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.datepicker-nav {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: all 0.2s;
}

.datepicker-nav:hover {
  background: rgba(255, 107, 157, 0.15);
  border-color: var(--primary);
  color: var(--text);
}

.datepicker-month-year {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 6px;
  transition: background 0.2s;
}

.datepicker-month-year:hover {
  background: rgba(255, 107, 157, 0.1);
}

/* Weekday labels */
.datepicker-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 4px;
  padding: 4px 0;
  transition: opacity 0.2s;
}

.datepicker-weekdays span {
  padding: 4px 0;
}

/* Day grid */
.datepicker-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.datepicker-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  color: var(--text-dim);
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  font-family: inherit;
}

.datepicker-day:hover {
  background: rgba(255, 107, 157, 0.12);
  color: var(--text);
}

.datepicker-day.selected {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
}

.datepicker-day.other-month {
  color: rgba(255, 255, 255, 0.15);
}

.datepicker-day.today {
  border: 1px solid var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.datepicker-day.today.selected {
  border-color: transparent;
  color: #fff;
}

/* Month / year grid items */
.datepicker-month-item,
.datepicker-year-item {
  aspect-ratio: auto;
  padding: 8px 4px;
  border-radius: 8px;
  font-size: 0.82rem;
  grid-column: span 1;
}

/* Year/month view: 4-column grid */
.datepicker-days.wide-grid {
  grid-template-columns: repeat(4, 1fr) !important;
}

/* Footer */
.datepicker-footer {
  display: flex;
  justify-content: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--glass-border);
}

.datepicker-today-btn {
  background: transparent;
  border: 1px solid var(--glass-border);
  color: var(--accent);
  font-size: 0.75rem;
  padding: 4px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.datepicker-today-btn:hover {
  background: rgba(192, 132, 252, 0.12);
  border-color: var(--accent);
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIMELINE MODAL
   ═══════════════════════════════════════════════════════════════════════════*/

.timeline-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.timeline-modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.timeline-modal {
  position: relative;
  background: linear-gradient(135deg, rgba(20, 10, 30, 0.95), rgba(10, 10, 26, 0.95));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 107, 157, 0.2);
  border-radius: 20px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 107, 157, 0.1);
  transform: scale(0.9) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.timeline-modal-overlay.open .timeline-modal {
  transform: scale(1) translateY(0);
}

.timeline-modal-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  object-position: center 20%;
  border-radius: 20px 20px 0 0;
  display: block;
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(192, 132, 252, 0.1));
}

.timeline-modal-img.loading {
  background: linear-gradient(
    90deg,
    rgba(255, 107, 157, 0.06) 0%,
    rgba(255, 107, 157, 0.15) 40%,
    rgba(192, 132, 252, 0.15) 60%,
    rgba(255, 107, 157, 0.06) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

.timeline-modal-img-placeholder {
  width: 100%;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  color: var(--text-dim);
  background: linear-gradient(135deg, rgba(255, 107, 157, 0.08), rgba(192, 132, 252, 0.08));
  border-radius: 20px 20px 0 0;
}

.timeline-modal-body {
  padding: 24px;
}

.timeline-modal-date {
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.timeline-modal-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.timeline-modal-badge {
  display: inline-block;
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
  font-weight: 500;
}

.timeline-modal-desc {
  color: var(--text-dim);
  line-height: 1.8;
  font-size: 0.92rem;
}

.timeline-modal-info {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 8px;
}
.timeline-modal-info i {
  width: 16px;
  text-align: center;
  color: var(--primary);
}
.timeline-modal-info a {
  color: var(--primary);
  text-decoration: none;
}
.timeline-modal-info a:hover {
  text-decoration: underline;
}

/* ── Modal image gallery ── */
.timeline-modal-gallery {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 0;
  margin-bottom: 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.timeline-modal-gallery img {
  flex: 0 0 auto;
  width: 240px;
  height: 220px;
  object-fit: cover;
  object-position: center 20%;
  border-radius: 8px;
  scroll-snap-align: start;
  border: 1px solid var(--glass-border);
}
.timeline-modal-gallery img.loading {
  background: linear-gradient(
    90deg,
    rgba(255, 107, 157, 0.06) 0%,
    rgba(255, 107, 157, 0.15) 40%,
    rgba(192, 132, 252, 0.15) 60%,
    rgba(255, 107, 157, 0.06) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

/* ── B站 icon ── */
.timeline-modal-info .fab.fa-bilibili {
  color: #fb7299;
}

/* ── Birthday cake fountain ── */
.birthday-cake {
  position: fixed;
  font-size: 1.6rem;
  pointer-events: none;
  z-index: 9999;
  animation: cakeFountain 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  opacity: 0;
}
@keyframes cakeFountain {
  0%   { opacity: 1; transform: translate(0, 0) scale(0.3) rotate(0deg); }
  15%  { opacity: 1; transform: translate(calc(var(--dx) * 0.3), calc(var(--dy) * 0.3)) scale(1.1) rotate(60deg); }
  40%  { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1) rotate(180deg); }
  70%  { opacity: 0.8; transform: translate(calc(var(--dx) * 0.8), calc(var(--dy) * 0.6)) scale(0.7) rotate(300deg); }
  100% { opacity: 0; transform: translate(calc(var(--dx) * 0.3), calc(var(--dy) * 0.1)) scale(0.3) rotate(360deg); }
}

.timeline-modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 10;
}

.timeline-modal-close:hover {
  background: rgba(255, 107, 157, 0.3);
  border-color: var(--primary);
}

.timeline-modal-replay-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  padding: 8px 18px;
  border-radius: 20px;
  background: rgba(74, 222, 128, 0.12);
  border: 1px solid rgba(74, 222, 128, 0.25);
  color: #4ade80;
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
}

.timeline-modal-replay-btn:hover {
  background: rgba(74, 222, 128, 0.2);
  border-color: #4ade80;
  box-shadow: 0 0 16px rgba(74, 222, 128, 0.2);
}

/* ── Responsive ── */
@media (max-width: 768px) {

  .timeline-event { width: 180px; margin: 0 8px; }
  .timeline-card-img, .timeline-card-img-placeholder { height: 65px; }
  .timeline-modal { max-width: 95vw; }
  .timeline-modal-img, .timeline-modal-img-placeholder { height: 160px; }
  .timeline-hint { top: calc(50% + 235px); font-size: 0.7rem; }
  .timeline-filter-bar { top: calc(10px + var(--nav-height)); left: 8px; padding: 3px 8px; gap: 4px; }
  .timeline-filter-btn { font-size: 0.68rem; padding: 3px 7px; }

  .timeline-zoom-controls { top: calc(10px + var(--nav-height)); right: 8px; gap: 4px; }
  .timeline-date-jump-wrap { margin-left: 2px; padding-left: 4px; }
  .timeline-date-input { width: 90px; padding: 4px 6px; font-size: 0.72rem; }
  .timeline-datepicker-popup { right: 0; left: auto; width: 220px; }
  .timeline-zoom-btn { width: 30px; height: 30px; font-size: 0.85rem; }
  .timeline-connector-above,
  .timeline-connector-below { height: 14px; }
  .timeline-event-above .timeline-card { bottom: calc(50% + 7px + 14px); }
  .timeline-event-below .timeline-card { top: calc(50% + 7px + 14px); }
  .timeline-event-above .timeline-card-stack { bottom: calc(50% + 7px + 14px); }
  .timeline-event-below .timeline-card-stack { top: calc(50% + 7px + 14px); }
  .timeline-card-stack .timeline-card-img,
  .timeline-card-stack .timeline-card-img-placeholder { height: 45px; }
  .timeline-card-stack .timeline-card-body { padding: 5px 8px 8px; }
}
</style>
{% endblock %}

<!-- Mobile Circular Menu -->
<div class="circular-menu" id="circularMenu">

{% block content %}
<main class="timeline-page">
    <div class="timeline-wrapper" id="timelineWrapper">
        <!-- Horizontal axis line -->
        <div class="timeline-axis"></div>

        <!-- Source filter bar -->
        <div class="timeline-filter-bar" id="timelineFilterBar">
            <div class="timeline-filter-header" id="timelineFilterHeader">
                <span>类型</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="timeline-filter-options" id="timelineFilterOptions">
                <button class="timeline-filter-btn active" data-source="room">直播</button>
                <button class="timeline-filter-btn active" data-source="assistant">行程</button>
            </div>
        </div>

        <!-- Zoom controls + date jump -->
        <div class="timeline-zoom-controls">
            <button class="timeline-zoom-btn" id="zoomIn" title="放大">
                <i class="fas fa-plus"></i>
            </button>
            <button class="timeline-zoom-btn" id="zoomOut" title="缩小">
                <i class="fas fa-minus"></i>
            </button>
            <div class="timeline-date-jump-wrap">
                <div class="timeline-datepicker" id="timelineDatepicker">
                    <input type="text" id="timelineDateInput" class="timeline-date-input" readonly placeholder="选择日期">
                    <div class="timeline-datepicker-popup" id="datepickerPopup">
                        <div class="datepicker-header">
                            <button class="datepicker-nav" id="datepickerPrev"><i class="fas fa-chevron-left"></i></button>
                            <span class="datepicker-month-year" id="datepickerMonthYear"></span>
                            <button class="datepicker-nav" id="datepickerNext"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="datepicker-weekdays">
                            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
                        </div>
                        <div class="datepicker-days" id="datepickerDays"></div>
                        <div class="datepicker-footer">
                            <button class="datepicker-today-btn" id="datepickerToday">今天</button>
                        </div>
                    </div>
                </div>
                <button class="timeline-zoom-btn" id="timelineDateJump" title="跳转">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Track -->
        <div class="timeline-track" id="timelineTrack">
            <div class="timeline-loading" id="timelineLoading">
                <div class="spinner"></div>
                <span>加载中...</span>
            </div>
            <div class="timeline-track-inner" id="timelineTrackInner"></div>
        </div>

        <!-- Hint -->
        <div class="timeline-hint" id="timelineHint">
            <i class="fas fa-arrows-alt-h"></i>
            <span>拖拽滑动</span>
        </div>
    </div>

    <!-- Modal -->
    <div class="timeline-modal-overlay" id="timelineModalOverlay">
        <div class="timeline-modal" id="timelineModal">
            <button class="timeline-modal-close" id="timelineModalClose">
                <i class="fas fa-times"></i>
            </button>
            <div id="timelineModalContent"></div>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/timeline.js?v={{ static_version('js/timeline.js') }}"></script>
{% endblock %}
