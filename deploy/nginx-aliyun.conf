# ═══════════════════════════════════════════════════════════════════════════
# SNH48 演艺信息站 - Nginx 反向代理配置（阿里云香港）
# ═══════════════════════════════════════════════════════════════════════════
# 域名：cjy.我爱你（香港服务器，无需 ICP 备案）
# SSL：Let's Encrypt（通过 Certbot 自动申请和续签）
# 将本文件复制到 /etc/nginx/conf.d/cjy.xn--6qq986b3xl.conf 即可生效
# ═══════════════════════════════════════════════════════════════════════════

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name cjy.我爱你 cjy.xn--6qq986b3xl;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务（Let's Encrypt）
server {
    listen 443 ssl;
    http2 on;
    server_name cjy.我爱你 cjy.xn--6qq986b3xl;

    # ── Let's Encrypt SSL 证书（Certbot 自动管理） ──
    ssl_certificate     /etc/letsencrypt/live/cjy.xn--6qq986b3xl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cjy.xn--6qq986b3xl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 静态文件缓存
    location /static/ {
        alias /home/snh48_web/website/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 前端页面代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ⚠️ 图片代理暂不可用
    # 原腾讯云配置中的 image-proxy 指向 10.0.0.6:8899（腾讯云内网 VPC）
    # 阿里云香港服务器无法访问该地址，如需图片代理功能请在阿里云另行部署

    # 日志
    access_log /var/log/nginx/snh48_aliyun_access.log;
    error_log  /var/log/nginx/snh48_aliyun_error.log;
}
