# ═══════════════════════════════════════════════════════════════════════════
# SNH48 演艺信息站 - Nginx 反向代理配置（阿里云香港）
# ═══════════════════════════════════════════════════════════════════════════
# 域名：cjy.我爱你（香港服务器，无需 ICP 备案）
# SSL：Let's Encrypt（通过 Certbot 自动申请和续签）
# 将本文件复制到 /etc/nginx/conf.d/cjy.xn--6qq986b3xl.conf 即可生效
# ═══════════════════════════════════════════════════════════════════════════

# 图片代理共享缓存：优先保护上游并提升重复访问速度，缓存目录需由 Nginx worker 可写。
proxy_cache_path /var/cache/nginx/snh48_image_proxy levels=1:2 keys_zone=snh48_image_proxy:128m max_size=10g inactive=30d use_temp_path=off;

# 温和限速：正常浏览器并发图片加载有足够 burst，主要拦截异常刷量。
limit_req_zone $binary_remote_addr zone=snh48_image_proxy_rate:20m rate=10r/s;

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name cjy.我爱你 cjy.xn--6qq986b3xl;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务（Let's Encrypt）
server {
    listen 443 ssl;
    server_name cjy.我爱你 cjy.xn--6qq986b3xl;

    # ── Let's Encrypt SSL 证书（Certbot 自动管理） ──
    ssl_certificate     /etc/letsencrypt/live/cjy.xn--6qq986b3xl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cjy.xn--6qq986b3xl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  安全响应头 (2026-06-09)
    #  白名单说明见 deploy/nginx.conf 中同段注释
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # 混淆 JS（生产环境从 js-dist/ 加载）
    location /static/js/ {
        alias /home/snh48_web/website/static/js-dist/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # 压缩 CSS（生产环境从 css-dist/ 加载）
    location /static/css/ {
        alias /home/snh48_web/website/static/css-dist/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # 其他静态文件（images 等）
    location /static/ {
        alias /home/snh48_web/website/static/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 前端页面代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片代理（绕过新浪微博防盗链）
    location /image-proxy/ {
        proxy_pass http://127.0.0.1:8899/;
        proxy_set_header Host 127.0.0.1:8899;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache snh48_image_proxy;
        proxy_cache_key $uri;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 301 302 1d;
        proxy_cache_valid 404 10m;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 15s;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Set-Cookie;
        proxy_buffering on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        limit_req zone=snh48_image_proxy_rate burst=120 nodelay;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin * always;
    }

    # 日志
    access_log /var/log/nginx/snh48_aliyun_access.log;
    error_log  /var/log/nginx/snh48_aliyun_error.log;
}
