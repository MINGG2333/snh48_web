# ═══════════════════════════════════════════════════════════════════════════
# SNH48 演艺信息站 - Nginx 反向代理配置
# ═══════════════════════════════════════════════════════════════════════════
# 使用前请将 your-domain.com 替换为您的实际域名
# 备案完成后，将此文件复制到 /etc/nginx/conf.d/snh48.conf
# ═══════════════════════════════════════════════════════════════════════════

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（用 certbot 申请后会自动配置）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 静态文件缓存
    location /static/ {
        alias /home/snh48_web/website/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 前端页面代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 日志
    access_log /var/log/nginx/snh48_access.log;
    error_log  /var/log/nginx/snh48_error.log;
}
