# ═══════════════════════════════════════════════════════════════════════════
# SNH48 演艺信息站 - Nginx 反向代理配置
# ═══════════════════════════════════════════════════════════════════════════
# 域名：cjy.plus
# 将本文件复制到 /etc/nginx/conf.d/snh48.conf 即可生效
# ═══════════════════════════════════════════════════════════════════════════

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name cjy.plus www.cjy.plus;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务（先注释掉 SSL 相关，等腾讯云证书到位后再启用）
server {
    listen 443 ssl;
    http2 on;
    server_name cjy.plus www.cjy.plus;

    # ── 腾讯云 SSL 证书（从腾讯云控制台下载 Nginx 版证书） ──
    # 下载地址：腾讯云控制台 → SSL 证书 → 证书详情 → 下载 → Nginx
    # 上传到服务器后，将以下路径指向实际文件
    ssl_certificate     /etc/nginx/ssl/cjy.plus/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cjy.plus/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  安全响应头 (2026-06-09)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # HSTS: 强制 HTTPS（31536000秒 = 1年）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 防点击劫持
    add_header X-Frame-Options "DENY" always;
    # 防 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer 策略：同源传完整 URL，跨域只传域名
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ── CSP（内容安全策略）──
    # 白名单说明（如需新增 CDN 资源，在此添加域名）：
    #   script-src:  cdnjs.cloudflare.com (html2canvas/qrcode/font-awesome)
    #                cdn.jsdelivr.net (hls.js)
    #   style-src:   cdnjs.cloudflare.com, fonts.googleapis.com
    #   font-src:    cdnjs.cloudflare.com, fonts.gstatic.com
    #   img-src:     https: 允许所有 HTTPS 图片（微博/B站/48官网等外部图源）
    #   connect-src: 'self' + https: 允许 HLS.js 拉取外部 m3u8/ts 分片
    #   media-src:   https: + blob: 支持外部视频与 MediaSource blob
    #   worker-src:  blob: 支持 hls.js Web Worker
    # ⚠️ 'unsafe-inline' 是临时措施——因模板内嵌 <style>/<script> 较多
    #   长期建议迁移到 nonce 或 hash 方式
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # 混淆 JS（生产环境从 js-dist/ 加载）
    location /static/js/ {
        alias /home/snh48_web/website/static/js-dist/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # 压缩 CSS（生产环境从 css-dist/ 加载）
    location /static/css/ {
        alias /home/snh48_web/website/static/css-dist/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # 其他静态文件（images 等）
    location /static/ {
        alias /home/snh48_web/website/static/;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 前端页面代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片代理（走内网 VPC，绕过新浪防盗链）
    location /image-proxy/ {
        proxy_pass http://10.0.0.6:8899/;
        proxy_set_header Host 10.0.0.6:8899;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https: blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # 日志
    access_log /var/log/nginx/snh48_access.log;
    error_log  /var/log/nginx/snh48_error.log;
}
