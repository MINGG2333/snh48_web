# ═══════════════════════════════════════════════════════════════════════════
# SNH48 演艺信息站 - Nginx 反向代理配置
# ═══════════════════════════════════════════════════════════════════════════
# 域名：cjy.plus
# 将本文件复制到 /etc/nginx/conf.d/snh48.conf 即可生效
# ═══════════════════════════════════════════════════════════════════════════

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name cjy.plus www.cjy.plus;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务（先注释掉 SSL 相关，等腾讯云证书到位后再启用）
server {
    listen 443 ssl;
    http2 on;
    server_name cjy.plus www.cjy.plus;

    # ── 腾讯云 SSL 证书（从腾讯云控制台下载 Nginx 版证书） ──
    # 下载地址：腾讯云控制台 → SSL 证书 → 证书详情 → 下载 → Nginx
    # 上传到服务器后，将以下路径指向实际文件
    ssl_certificate     /etc/nginx/ssl/cjy.plus/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cjy.plus/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 静态文件缓存
    location /static/ {
        alias /home/snh48_web/website/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 前端页面代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片代理（走内网 VPC，绕过新浪防盗链）
    location /image-proxy/ {
        proxy_pass http://10.0.0.6:8899/;
        proxy_set_header Host 10.0.0.6:8899;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin *;
    }

    # 日志
    access_log /var/log/nginx/snh48_access.log;
    error_log  /var/log/nginx/snh48_error.log;
}
